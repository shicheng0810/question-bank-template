<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AMT 题库练习</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <script>(function(){try{var k="qb_theme",s=localStorage.getItem(k),m=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches,t=(s==="dark"||s==="light")?s:(m?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
  <style>
    :root{
      color-scheme: light;
      --bg:#eef1f6; --card:#ffffff; --card-2:#f6f8fc;
      --ink:#1e293b; --ink-soft:#3b4860; --muted:#64748b;
      --border:#e4e8f0; --border-strong:#d3d9e4;
      --brand:#2563eb; --brand-strong:#1d4ed8; --brand-weak:#eef4ff; --brand-ring:rgba(37,99,235,.18); --on-brand:#ffffff;
      --success:#059669; --success-ink:#047857; --success-bg:#e7f8f0; --success-border:#b6ead2;
      --danger:#dc2626; --danger-ink:#b91c1c; --danger-bg:#fdecec; --danger-border:#f6c9c9;
      --star:#f5a623;
      --badge-bg:#eef2ff; --badge-ink:#3730a3; --badge-border:#e0e7ff;
      --hover:#f1f5f9; --glow:rgba(37,99,235,.06);
      --shadow-sm:0 1px 2px rgba(16,24,40,.06); --shadow-md:0 8px 22px rgba(16,24,40,.08); --shadow-lg:0 20px 50px rgba(16,24,40,.16);
      --radius:14px; --radius-sm:10px; --radius-xs:8px; --pill:999px;
    }
    html[data-theme="dark"]{
      color-scheme: dark;
      --bg:#0b1020; --card:#141b2d; --card-2:#0f1626;
      --ink:#e8edf6; --ink-soft:#c4cee0; --muted:#93a0b8;
      --border:#26304a; --border-strong:#33415f;
      --brand:#6f9bff; --brand-strong:#5b8cff; --brand-weak:rgba(111,155,255,.14); --brand-ring:rgba(111,155,255,.32); --on-brand:#0b1020;
      --success:#34d399; --success-ink:#6ee7b7; --success-bg:rgba(16,185,129,.14); --success-border:rgba(52,211,153,.34);
      --danger:#f87171; --danger-ink:#fca5a5; --danger-bg:rgba(239,68,68,.15); --danger-border:rgba(248,113,113,.36);
      --star:#fbbf24;
      --badge-bg:rgba(99,102,241,.20); --badge-ink:#c7d2fe; --badge-border:rgba(129,140,248,.32);
      --hover:rgba(148,163,184,.12); --glow:rgba(111,155,255,.12);
      --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow-md:0 10px 26px rgba(0,0,0,.5); --shadow-lg:0 24px 60px rgba(0,0,0,.6);
    }
    *{box-sizing:border-box}
    html{-webkit-text-size-adjust:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--ink);
      background:radial-gradient(1100px 560px at 100% -12%, var(--glow), transparent 60%), var(--bg);
      background-attachment:fixed; min-height:100vh;
      max-width:960px; margin:0 auto; line-height:1.6; padding:18px 16px 64px;
      -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    }
    h1{font-size:1.4rem; font-weight:750; letter-spacing:-.01em; margin:0 0 10px}
    #quizApp[hidden], #unlock-panel[hidden]{display:none}
    /* .btn 用了 display:inline-flex（作者样式），会盖过浏览器默认的 [hidden]{display:none}，
       导致 Random150/Back150/返回目录 等靠 hidden 属性切换的按钮隐藏失效。全局兜底： */
    [hidden]{display:none !important}

    .app-header{display:flex; justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap;
      background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; box-shadow:var(--shadow-sm); margin-bottom:16px}
    .header-left{display:flex; align-items:center; gap:10px; min-width:0}
    .controls{display:flex; align-items:center; gap:8px; flex-wrap:wrap; color:var(--muted); font-size:13px}

    .unlock-panel{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin:48px auto; max-width:520px; box-shadow:var(--shadow-lg)}
    .unlock-panel h1{margin-bottom:8px}
    .unlock-row{display:flex; gap:8px; flex-wrap:wrap; margin-top:16px}
    .unlock-input{flex:1; min-width:240px; padding:11px 13px; border:1px solid var(--border-strong); border-radius:var(--radius-xs); font-size:15px; background:var(--card); color:var(--ink)}
    .unlock-error{margin-top:10px; color:var(--danger-ink); font-weight:600; display:none}
    .unlock-error.visible{display:block}

    .btn{appearance:none; font:inherit; font-size:13.5px; font-weight:600; line-height:1; padding:9px 13px;
      border:1px solid var(--border-strong); background:var(--card); color:var(--ink); border-radius:var(--radius-xs); cursor:pointer;
      display:inline-flex; align-items:center; gap:7px; box-shadow:var(--shadow-sm);
      transition:background .15s, border-color .15s, box-shadow .15s, transform .04s}
    .btn:hover{background:var(--hover)}
    .btn:active{transform:translateY(1px)}
    .btn:focus-visible{outline:2px solid var(--brand); outline-offset:2px}
    .btn-sm{padding:6px 10px; font-size:12px}
    .btn:disabled{opacity:.55; cursor:not-allowed; box-shadow:none}
    .submit-btn,.confirm-btn{background:var(--brand); color:var(--on-brand); border-color:transparent; box-shadow:0 1px 2px var(--brand-ring)}
    .submit-btn:hover,.confirm-btn:hover{background:var(--brand-strong)}
    .submit-btn:disabled{background:var(--muted); color:var(--card); opacity:.6}
    .redo-btn{background:var(--card)}
    .redo-btn:hover{background:var(--hover)}
    #ui-lang{font:inherit; font-size:13px; padding:8px 10px; border:1px solid var(--border-strong); border-radius:var(--radius-xs); background:var(--card); color:var(--ink); cursor:pointer; box-shadow:var(--shadow-sm)}
    #theme-toggle{width:36px; height:36px; padding:0; border-radius:var(--radius-xs); font-size:16px; display:inline-flex; align-items:center; justify-content:center; border:1px solid var(--border-strong); background:var(--card); color:var(--ink); cursor:pointer; box-shadow:var(--shadow-sm)}
    #theme-toggle:hover{background:var(--hover)}
    .controls .btn,.controls #ui-lang{height:36px}
    #tutorial-help-btn{justify-content:center}
    [data-testid="guide-close-btn"]{justify-content:center}

    .toolbar{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin:0 0 16px}
    #stats{margin-left:6px; font-weight:700; color:var(--ink-soft); font-size:13.5px}
    .mt-2{margin-top:8px}

    details.filter-panel{width:100%; margin-bottom:14px; border:1px solid var(--border); border-radius:var(--radius); background:var(--card); overflow:hidden; box-shadow:var(--shadow-sm)}
    summary.btn{border:none; border-radius:0; box-shadow:none; background:var(--card-2); width:100%; text-align:left; font-weight:650; list-style:none; display:flex; justify-content:space-between; align-items:center; padding:13px 16px; color:var(--ink)}
    summary.btn:hover{background:var(--hover)}
    summary.btn::-webkit-details-marker{display:none}
    summary.btn::after{content:"\25BE"; font-size:13px; margin-left:10px; color:var(--muted); transition:transform .2s}
    details[open] summary.btn::after{transform:rotate(180deg)}
    .filter-content{padding:14px 16px; border-top:1px solid var(--border)}
    .filter-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:8px; margin-bottom:12px}
    .filter-label{display:flex; align-items:center; gap:8px; font-size:13.5px; cursor:pointer; user-select:none; padding:7px 9px; border-radius:var(--radius-xs); border:1px solid transparent}
    .filter-label:hover{background:var(--hover); border-color:var(--border)}
    .filter-label input{accent-color:var(--brand); width:16px; height:16px; margin:0}

    .question-card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px 18px 16px; margin-bottom:16px; box-shadow:var(--shadow-sm); transition:border-color .18s, box-shadow .18s}
    .question-card:hover{border-color:var(--border-strong)}
    .question-header{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:6px}
    .q-badge{display:inline-flex; align-items:center; font-weight:700; font-size:12.5px; background:var(--badge-bg); color:var(--badge-ink); border:1px solid var(--badge-border); padding:3px 10px; border-radius:var(--pill)}
    .question-text{font-size:16.5px; font-weight:650; line-height:1.5; margin:6px 0 10px; flex:1; color:var(--ink)}
    .meta{font-size:12.5px; color:var(--muted); margin-top:8px}
    img{max-width:100%; height:auto; border-radius:var(--radius-xs); border:1px solid var(--border)}
    .img-wrap{margin:10px 0}

    .star-btn{border:none; background:transparent; cursor:pointer; padding:4px; width:30px; height:30px; display:inline-flex; align-items:center; justify-content:center; border-radius:var(--pill); line-height:0}
    .star-btn:hover{background:var(--hover)}
    .star-btn svg{width:18px; height:18px; fill:transparent; stroke:var(--muted); transition:transform .12s ease}
    .star-btn:hover svg{transform:scale(1.08)}
    .star-btn.starred svg{fill:var(--star); stroke:var(--star)}

    .choices{list-style:none; padding:0; margin:10px 0 0}
    .choice-item{margin:8px 0}
    .choice-btn{width:100%; text-align:left; background:var(--card); color:var(--ink); border:1px solid var(--border-strong); border-radius:var(--radius-sm); padding:12px 14px; display:flex; align-items:flex-start; gap:11px; font-size:15px; line-height:1.45; cursor:pointer; transition:background .15s, border-color .15s, box-shadow .15s, transform .04s}
    .choice-btn:hover{background:var(--hover)}
    .choice-btn:active{transform:translateY(1px)}
    .choice-btn.selected{border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-ring); background:var(--brand-weak)}
    .choice-btn.disabled{cursor:default}
    .choice-btn.disabled:hover{background:var(--card)}
    .choice-btn.selected.disabled{background:var(--brand-weak); border-color:var(--brand)}
    .choice-btn.is-correct{border-color:var(--success); background:var(--success-bg); color:var(--success-ink); box-shadow:none}
    .choice-btn.is-wrong{border-color:var(--danger); background:var(--danger-bg); color:var(--danger-ink); box-shadow:none}
    .choice-btn.is-correct::after{content:"✓"; margin-left:auto; font-weight:700}
    .choice-btn.is-wrong::after{content:"✗"; margin-left:auto; font-weight:700}
    .quiz-progress{position:sticky; top:0; z-index:40; background:var(--bg); padding:10px 0 12px; margin-bottom:8px; border-bottom:1px solid var(--border)}
    .quiz-progress[hidden]{display:none}
    .qp-bar{height:8px; border-radius:var(--pill); background:var(--card-2); border:1px solid var(--border); overflow:hidden}
    .qp-fill{height:100%; width:0; background:var(--brand); border-radius:var(--pill); transition:width .25s ease}
    .qp-meta{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:8px; font-size:12.5px; color:var(--muted)}

    .qb-blank{display:inline-block; min-width:140px; max-width:260px; width:clamp(140px, 22vw, 260px); padding:8px 10px; margin:0 6px 4px 6px; border:1px solid var(--border-strong); border-radius:var(--radius-xs); font-size:15px; font-weight:500; background:var(--card); color:var(--ink); vertical-align:baseline}
    .qb-blank:disabled{background:var(--card-2); opacity:.9}
    .qb-blank:focus{outline:none; border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-ring)}

    .fill-area{margin:8px 0; display:flex; flex-direction:column; gap:8px}
    .fill-row{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    .fill-label{font-size:12px; color:var(--muted); min-width:64px}
    .fill-input{flex:1; min-width:240px; padding:10px 12px; border:1px solid var(--border-strong); border-radius:var(--radius-xs); font-size:15px; background:var(--card); color:var(--ink)}
    .fill-input:disabled{background:var(--card-2); opacity:.9}
    .fill-input:focus,.unlock-input:focus{outline:none; border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-ring)}

    .action-bar{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px}
    .feedback{margin-top:12px; display:none}
    .feedback.visible{display:block}
    .correct{display:block; color:var(--success-ink); background:var(--success-bg); border:1px solid var(--success-border); padding:11px 13px; border-radius:var(--radius-xs); font-weight:650}
    .wrong{display:block; color:var(--danger-ink); background:var(--danger-bg); border:1px solid var(--danger-border); padding:11px 13px; border-radius:var(--radius-xs); font-weight:650}

    .keys-panel{margin-top:12px; padding:12px 14px; border:1px dashed var(--border-strong); border-radius:var(--radius-xs); background:var(--card-2); display:none}
    .keys-title{font-weight:700; margin-bottom:6px; color:var(--ink)}
    .keys-row{font-size:12.5px; color:var(--muted); margin:4px 0}
    .keys-chip{display:inline-block; padding:3px 9px; border-radius:var(--pill); border:1px solid var(--border-strong); background:var(--card); font-size:12px; color:var(--ink); margin:3px 6px 3px 0}

    code{background:var(--card-2); border:1px solid var(--border); padding:1px 5px; border-radius:5px; font-size:.92em}
  </style>
</head>
<body>
  <section id="unlock-panel" class="unlock-panel" hidden>
    <a class="btn" id="back-catalog-unlock" href="./" hidden data-i18n="back_catalog" style="margin-bottom:10px;display:inline-block">← Catalog</a>
    <p class="meta" data-i18n="unlock_eyebrow">Protected Question Bank</p>
    <h1 data-i18n="unlock_title">Enter password</h1>
    <p class="meta" data-i18n="unlock_desc">This HTML file is encrypted. Enter the password provided by the owner to start practicing.</p>
    <div class="unlock-row">
      <input id="legacy-password" class="unlock-input" type="password" autocomplete="current-password" placeholder="Question bank password" data-i18n-placeholder="unlock_placeholder">
      <button id="legacy-unlock-btn" class="btn submit-btn" type="button" data-i18n="unlock_btn">Unlock</button>
    </div>
    <div id="legacy-unlock-error" class="unlock-error"></div>
  </section>

  <main id="quizApp" hidden>
  <div class="app-header">
    <div class="header-left">
      <a class="btn" id="back-catalog" href="./" hidden data-i18n="back_catalog" data-testid="back-catalog-link">← Catalog</a>
      <h1 data-i18n="title_h1" style="margin:0">AMT Question Bank Practice</h1>
    </div>
    <label class="controls">
      🌐
      <select id="ui-lang" onchange="setUiLang(this.value)" data-testid="ui-lang-select">
        <option value="en">English</option>
        <option value="zh">中文</option>
        <option value="es">Español</option>
      </select>
      <button class="btn" id="theme-toggle" type="button" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">🌙</button>
      <button class="btn" id="guide-btn" onclick="openGuide()" data-testid="guide-open-btn" data-i18n="guide_summary">Button Guide</button>
      <button class="btn" id="tutorial-help-btn" onclick="openTutorial()" data-testid="tutorial-help-btn"
              title="Tutorial" aria-label="Open tutorial"
              style="width:36px;height:36px;border-radius:50%;padding:0;font-weight:700">?</button>
    </label>
  </div>

  <details class="filter-panel">
    <summary class="btn" data-i18n="filter_summary">Filter Question Banks</summary>
    <div class="filter-content">
      <div class="filter-grid" id="filter-container"></div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-sm" onclick="toggleFilters(true)" data-i18n="select_all">Select All</button>
        <button class="btn btn-sm" onclick="toggleFilters(false)" data-i18n="select_none">Select None</button>
        <button class="btn btn-sm confirm-btn" onclick="confirmFilters()" data-i18n="confirm">Confirm</button>
      </div>
    </div>
  </details>

  <div class="toolbar">
    <button class="btn" id="btn-random" onclick="shuffleAndRender()" data-i18n="randomize">Randomize + Reset</button>
    <button class="btn" id="btn-auto"  onclick="toggleAutoSubmit()">Auto Submit: OFF</button>
    <button class="btn" id="btn-random150" onclick="showRandom150()" disabled>Random Choose 150</button>
    <button class="btn" id="btn-back150" onclick="showCurrent150()" disabled>Back to Current 150</button>
    <button class="btn" id="btn-wrong" onclick="showWrongOnly()">Wrong Only (0)</button>
    <button class="btn" id="btn-star"  onclick="showStarOnly()">Star Only (0)</button>
    <button class="btn" id="btn-back"  onclick="showAll()" disabled data-i18n="back_all">Back to All</button>
    <span id="stats"></span>
  </div>

  <div id="quiz-progress" class="quiz-progress" hidden>
    <div class="qp-bar"><div class="qp-fill" id="qp-fill"></div></div>
    <div class="qp-meta">
      <span id="qp-text"></span>
      <button class="btn btn-sm" id="qp-next" type="button" onclick="jumpToNextUnanswered()">Next unanswered →</button>
    </div>
  </div>
  <div id="quiz"></div>
  </main>

  <!-- 首次打开的新手教程（纯英文，可 Skip；完成/跳过后写 localStorage 不再出现） -->
  <style>
    .tut-overlay{position:fixed; inset:0; background:rgba(15,23,42,.55); backdrop-filter:blur(2px); z-index:90; display:flex; align-items:flex-end; justify-content:center; padding:18px}
    .tut-overlay[hidden]{display:none}
    .tut-card{background:var(--card); color:var(--ink); border:1px solid var(--border); border-radius:var(--radius); max-width:520px; width:100%; padding:22px 24px; box-shadow:var(--shadow-lg); margin-bottom:8vh}
    .tut-step{font-size:12px; font-weight:700; color:var(--brand); letter-spacing:.06em; text-transform:uppercase}
    .tut-card h2{margin:6px 0 8px; font-size:1.2rem; color:var(--ink)}
    .tut-card p{margin:0; color:var(--ink-soft); line-height:1.65; font-size:14.5px}
    .tut-actions{display:flex; gap:8px; margin-top:18px; align-items:center}
    .tut-actions .spacer{flex:1}
    .tut-highlight{position:relative; z-index:95; box-shadow:0 0 0 3px var(--brand),0 0 0 7px var(--brand-ring)!important; border-radius:var(--radius-xs)}
    #qb-guide{align-items:center}
    .guide-card{max-width:640px}
    .guide-card ul{margin:12px 0 0; padding-left:18px; line-height:1.9; overflow:auto; max-height:62vh; color:var(--ink-soft)}
    .guide-card ul strong{color:var(--ink)}
  </style>
  <!-- All Banks 合并页：开始前选择要练习的题库（公开勾选、加密解锁加入），按所选现场合并 -->
  <div class="tut-overlay" id="qb-allbanks" hidden data-testid="qb-allbanks" style="align-items:center">
    <div class="tut-card guide-card">
      <h2 data-i18n="ab_title" style="margin:0 0 6px;font-size:1.15rem">Choose banks to practice</h2>
      <p data-i18n="ab_desc" style="margin:0;color:var(--ink-soft);font-size:14px;line-height:1.6">Tick the banks you want.</p>
      <div id="ab-public-list" style="display:grid;gap:8px;margin-top:14px"></div>
      <div id="ab-list" style="display:grid;gap:10px;margin-top:10px"></div>
      <p id="ab-msg" class="meta" style="margin:10px 0 0;color:var(--danger-ink)" hidden></p>
      <div class="tut-actions">
        <span class="spacer"></span>
        <button class="btn submit-btn" id="ab-start" data-testid="allbanks-start-btn" onclick="startAllBanksMerged()" data-i18n="ab_start">Start practicing</button>
      </div>
    </div>
  </div>

  <!-- 按钮说明弹窗（点 Button Guide 打开；点遮罩或 ✕ 关闭） -->
  <div class="tut-overlay" id="qb-guide" hidden data-testid="qb-guide" onclick="if(event.target===this)closeGuide()">
    <div class="tut-card guide-card">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px">
        <h2 data-i18n="guide_summary" style="margin:0;font-size:1.15rem">Button Guide</h2>
        <button class="btn" onclick="closeGuide()" data-testid="guide-close-btn" aria-label="Close" style="width:36px;height:36px;border-radius:50%;padding:0">✕</button>
      </div>
      <ul class="meta" id="guide-list"></ul>
    </div>
  </div>

  <div class="tut-overlay" id="qb-tutorial" hidden data-testid="qb-tutorial">
    <div class="tut-card">
      <div class="tut-step" id="tut-step-label">Step 1</div>
      <h2 id="tut-title"></h2>
      <p id="tut-body"></p>
      <div class="tut-actions">
        <button class="btn" id="tut-skip" data-testid="tutorial-skip-btn" onclick="endTutorial()">Skip</button>
        <span class="spacer"></span>
        <button class="btn" id="tut-back" onclick="tutorialMove(-1)">Back</button>
        <button class="btn submit-btn" id="tut-next" data-testid="tutorial-next-btn" onclick="tutorialMove(1)">Next</button>
      </div>
    </div>
  </div>

  <script>
    // 每个题库一个存储命名空间：发布到同一域名（如 Cloudflare Pages）的多个题库页
    // 互不串档。构建/导出时注入题库 id；旧导出未注入时回退到共享的 "amt"。
    const RAW_STORAGE_NS = "local";
    // let 而非 const：local.html（本地导入模式）会在启动时按 ?bank= 参数重设命名空间
    let STORAGE_NS = (RAW_STORAGE_NS && RAW_STORAGE_NS.indexOf("__") !== 0 && /^[A-Za-z0-9_-]{1,64}$/.test(RAW_STORAGE_NS)) ? RAW_STORAGE_NS : "amt";
    let STAR_KEY=STORAGE_NS+"_starred_questions";
    let WRONG_KEY=STORAGE_NS+"_wrong_questions";
    const AUTO_KEY="amt_auto_submit"; // 自动提交是个人偏好，保持跨题库共享
    let ATTEMPT_COUNT_KEY=STORAGE_NS+"_attempt_count_map_v1";
    function setStorageNamespace(ns){
      STORAGE_NS = /^[A-Za-z0-9_-]{1,64}$/.test(String(ns)) ? String(ns) : "amt";

    function bytesFromBase64(value){
      const binary = atob(String(value || "").trim());
      const bytes = new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }
    function textToBytes(value){ return new TextEncoder().encode(String(value ?? "")); }
    function bytesToText(bytes){ return new TextDecoder().decode(bytes); }
    async function deriveLegacyKey(password, salt, kdf){
      if(!(globalThis.crypto && crypto.subtle)) throw new Error("This browser does not support Web Crypto.");
      const baseKey = await crypto.subtle.importKey("raw", textToBytes(password), { name:"PBKDF2" }, false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        {
          name:"PBKDF2",
          salt,
          iterations:Number(kdf && kdf.iterations) || 250000,
          hash:String(kdf && kdf.hash || "SHA-256"),
        },
        baseKey,
        { name:"AES-GCM", length:256 },
        false,
        ["decrypt"],
      );
    }
    async function gunzipLegacyPayload(bytes){
      if(typeof DecompressionStream !== "function"){
        throw new Error("This browser does not support gzip decompression for encrypted banks.");
      }
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
      return new Uint8Array(await new Response(stream).arrayBuffer());
    }
    async function decryptLegacyBank(envelope, password){
      if(!envelope || envelope.format !== "qbpack-v1" || envelope.cipher !== "AES-GCM-256"){
        throw new Error("Unsupported encrypted bank format.");
      }
      if(envelope.compression !== "gzip") throw new Error("Unsupported encrypted bank compression.");
      const salt = bytesFromBase64(envelope.salt_b64);
      const iv = bytesFromBase64(envelope.iv_b64);
      const ciphertext = bytesFromBase64(envelope.ciphertext_b64);
      const key = await deriveLegacyKey(password, salt, envelope.kdf || {});
      let decrypted;
      try{
        decrypted = await crypto.subtle.decrypt({ name:"AES-GCM", iv }, key, ciphertext);
      }catch(_e){
        throw new Error("Password is incorrect, or this file is damaged.");
      }
      const jsonText = bytesToText(await gunzipLegacyPayload(new Uint8Array(decrypted)));
      const parsed = JSON.parse(jsonText);
      return Array.isArray(parsed) ? parsed : [];
    }

    function mapCountMap(obj){
      const src = (obj && typeof obj === 'object' && !Array.isArray(obj)) ? obj : {};
      const out = {};
      for(const [rawId, rawCount] of Object.entries(src)){
        const id = canonicalId(rawId);
        const count = Number(rawCount || 0);

        out[id] = (out[id] || 0) + count;
      }
      return out;

    function getAttemptCount(id){
      const key = canonicalId(id);
      return Math.max(0, Number((attemptCountMap && attemptCountMap[key]) || 0));
    }
    function bumpAttemptCount(id){
      const key = canonicalId(id);
      if(!key) return;
      attemptCountMap[key] = getAttemptCount(key) + 1;
      saveCountMap(ATTEMPT_COUNT_KEY, attemptCountMap);
    }

    function escHTML(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;");
    }

    function renderSource(q){
      const s = (q && (q.source ?? q.sources)) ?? "";
      const arr = Array.isArray(s) ? s : (s ? [s] : []);
      // use text join; keep compact
      return escHTML(arr.filter(Boolean).join(" | "));
    }

    function getBanks(q){
      const out = [];
      if(q && Array.isArray(q.banks)) out.push(...q.banks);
      const id = String(q && q.id ? q.id : "");
      if(id.includes("-")) out.push(id.split("-")[0]);
      return Array.from(new Set(out.filter(Boolean)));
    }

    function normText(s){
      return String(s ?? "")
        .replace(/\u00a0/g, " ")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, " ");
    }

    function fnv1a64(str){
      let h = 0xcbf29ce484222325n;
      const prime = 0x100000001b3n;
      for(let i=0;i<str.length;i++){
        h ^= BigInt(str.charCodeAt(i));
        h = (h * prime) & 0xffffffffffffffffn;
      }
      return h.toString(16).padStart(16,"0");
    }

    function makeQuestionKey(q){
      const isFillQ = (q && (q.type === "fill" || Array.isArray(q.blanks)));
      const isEssayQ = (q && q.type === "essay");
      const isMultiQ = (q && Array.isArray(q.answers));
      const type = isFillQ ? "fill" : (isEssayQ ? "essay" : (isMultiQ ? "multi" : "single"));
      let key = type + "|" + normText(q && q.question);

      if(type === "fill"){
        const blanks = Array.isArray(q.blanks) ? q.blanks : [];
        const bParts = blanks.map(arr=>{
          const list = (Array.isArray(arr)?arr:[arr]).map(normText).filter(Boolean).sort();
          return list.join("/");
        });
        key += "|blanks:" + bParts.join("||");
      }else if(type === "essay"){
        // only question text
      }else{
        const choices = Array.isArray(q.choices) ? q.choices : [];
        const normChoices = choices.map(normText);

        // Smart merge: identify a question by stem + correct-answer text, independent of
        // distractor wording. The same question imported from two sources often has reworded /
        // reordered wrong options; those should still fuse.
        let correct;
        if(type === "multi"){
          const idxs = (Array.isArray(q.answers)?q.answers:[])
            .map(x=>Number(x))
            .filter(x=>Number.isFinite(x) && x>=0 && x<normChoices.length)
            .sort((a,b)=>a-b);
          correct = idxs.map(i=>normChoices[i]).filter(Boolean).sort();
        }else{
          const ai = Number(q.answer);
          const c = (Number.isFinite(ai) && ai>=0 && ai<normChoices.length) ? normChoices[ai] : "";
          correct = c ? [c] : [];
        }
        // Fall back to the full choice set only when the correct answer is unknown,
        // to avoid over-merging distinct unanswered questions that share a stem.
        if(!correct.length){
          key += "|choicebag:" + [...normChoices].sort().join("||");
        }
        key += "|correct:" + correct.join("||");
      }

      // 注意：key 不含图片指纹（与导出端 makeUniqueQuestionKey 同步）——同题一边有图
      // 一边缺图也应合并，图片在合并时取并集。
      return key;
    }

    function mergeUnique(a,b){
      const out = [];
      const push = (x)=>{ if(x===null||x===undefined) return; const s=String(x); if(!s) return; if(!out.includes(s)) out.push(s); };
      (a||[]).forEach(push); (b||[]).forEach(push);
      return out;
    }

    function collectImageList(q){
      const img = q && q.image;
      if(!img) return [];
      const arr = Array.isArray(img) ? img : [img];
      return arr.filter(Boolean);
    }

    function setImageField(obj, list){
      const uniq = [];
      for(const s of list){
        if(!s) continue;
        if(!uniq.includes(s)) uniq.push(s);
      }
      if(!uniq.length){ delete obj.image; return; }
      obj.image = (uniq.length===1) ? uniq[0] : uniq;
    }

    // Dedupe identical questions, merge sources + banks, and build id alias mapping.
    function dedupeQuestionBank(raw){
      const byKey = new Map(); // key -> canonical question object
      const alias = {};
      const out = [];
      const list = Array.isArray(raw) ? raw : (raw ? [raw] : []);

      for(const q0 of list){
        if(!q0) continue;
        const key = makeQuestionKey(q0);
        let canon = byKey.get(key);

        if(!canon){
          const id = "q_" + fnv1a64(key);
          canon = { ...q0, id };
          // banks + source (start as arrays)
          canon.banks = getBanks(q0);
          const srcArr = Array.isArray(q0.source) ? q0.source : (q0.source ? [q0.source] : []);
          canon.source = mergeUnique([], srcArr);

          // merge images (keep union)
          setImageField(canon, collectImageList(q0));

          // keep one question_html if available
          if(q0.question_html) canon.question_html = q0.question_html;

          byKey.set(key, canon);
          out.push(canon);
        }else{
          // banks
          canon.banks = mergeUnique(canon.banks, getBanks(q0));

          // sources
          const srcArr = Array.isArray(q0.source) ? q0.source : (q0.source ? [q0.source] : []);
          canon.source = mergeUnique(canon.source, srcArr);

          // images
          setImageField(canon, mergeUnique(collectImageList(canon), collectImageList(q0)));

          // prefer having question_html
          if(!canon.question_html && q0.question_html) canon.question_html = q0.question_html;
        }

        // alias for old ids
        if(q0.id) alias[String(q0.id)] = canon.id;
      }

      // 二段合并（与导出端 buildUniqueMergedQuestionBankFromCollections 同步）：
      // 主 key 对「有答案/无答案」不对称，同题一份带答案一份不带会双份并存。把无答案的
      // 选择题按 题干+完整选项集合 匹配有答案的同题：恰好一条则吸收进去；多条（同干同
      // 选项不同答案）保持独立。
      const shapeKey = (q)=>{
        const cs = (Array.isArray(q.choices)?q.choices:[]).map(normText).sort();
        return normText(q.question) + "||" + cs.join("||");
      };
      const hasAns = (q)=> Array.isArray(q.answers) ? q.answers.length>0 : (Number.isFinite(Number(q.answer)) && Number(q.answer)>=0);
      const isChoiceQ = (q)=> Array.isArray(q.choices) && q.choices.length>0 && !(q.type==="fill"||Array.isArray(q.blanks));
      const ansByShape = new Map();
      for(const q of out){
        if(isChoiceQ(q) && hasAns(q)){
          const k = shapeKey(q);
          if(!ansByShape.has(k)) ansByShape.set(k, []);
          ansByShape.get(k).push(q);
        }
      }
      for(let i=out.length-1;i>=0;i--){
        const q = out[i];
        if(!isChoiceQ(q) || hasAns(q)) continue;
        const targets = ansByShape.get(shapeKey(q)) || [];
        if(targets.length !== 1) continue;
        const t = targets[0];
        t.banks = mergeUnique(t.banks, q.banks);
        t.source = mergeUnique(Array.isArray(t.source)?t.source:[t.source], Array.isArray(q.source)?q.source:[q.source]);
        setImageField(t, mergeUnique(collectImageList(t), collectImageList(q)));
        if(!t.question_html && q.question_html) t.question_html = q.question_html;
        for(const k0 of Object.keys(alias)) if(alias[k0] === q.id) alias[k0] = t.id;
        alias[q.id] = t.id;
        out.splice(i, 1);
      }

      // Normalize: if only one source, keep as string (backward friendly)
      out.forEach(q=>{
        if(Array.isArray(q.source)){
          q.source = q.source.length <= 1 ? (q.source[0] || "") : q.source;
        }
        if(Array.isArray(q.banks)){
          q.banks = q.banks.filter(Boolean);
        }
      });

      return { bank: out, alias };
    }

    function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
    function getQ(qId){ return currentQuestions.find(q=>q.id===qId) || QUESTION_BANK.find(q=>q.id===qId) }

    function isMulti(q){ return Array.isArray(q?.answers) }
    function isFill(q){ return (q?.type === 'fill') || Array.isArray(q?.blanks) }
    function isEssay(q){ return (q?.type === 'essay') }

    function setEqualsArray(setObj, arr){
      if (setObj.size !== arr.length) return false;
      for (const x of arr) if (!setObj.has(x)) return false;
      return true;
    }

    // --- Fill answer normalization & match ---
    function normKeepSpace(s){
      return String(s ?? "")
        .replace(/\u00a0/g, " ")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, " ");
    }
    function normNoSpace(s){
      return normKeepSpace(s).replace(/\s+/g, "");
    }
    function eqLoose(a,b){
      // ignore case, allow multi spaces, and treat "with/without spaces" as same
      const a1 = normKeepSpace(a), b1 = normKeepSpace(b);
      if (a1 === b1) return true;
      return normNoSpace(a) === normNoSpace(b);
    }

    // multiple answer-set matching support:
    // If q.answer_sets exists: array of sets, each set = [ans1, ans2, ...] for each blank.
    // Otherwise use q.blanks: blanks[i] = [acceptable answers...]
    function checkFill(q, inputs){
      const n = Array.isArray(q.blanks) ? q.blanks.length : 0;
      if (!n) return { ok:false, detail:"No blanks defined." };
      if (!Array.isArray(inputs) || inputs.length !== n) return { ok:false, detail:"Inputs length mismatch." };

      // require all filled
      for (let i=0;i<n;i++){
        if (!String(inputs[i] ?? "").trim()) return { ok:false, detail:"Please fill all blanks." };
      }

      // If multiple answer sets exist, OR-match by set
      if (Array.isArray(q.answer_sets) && q.answer_sets.length){
        const sets = q.answer_sets;
        const ok = sets.some(set => {
          if (!Array.isArray(set) || set.length !== n) return false;
          for (let i=0;i<n;i++){
            const expected = set[i];
            if (Array.isArray(expected)){
              const hit = expected.some(x => eqLoose(inputs[i], x));
              if (!hit) return false;
            }else{
              if (!eqLoose(inputs[i], expected)) return false;
            }
          }
          return true;
        });
        return { ok, detail: ok ? "" : "Not matching any accepted answer set." };
      }

      // Per-blank matching
      for (let i=0;i<n;i++){
        const expectedList = Array.isArray(q.blanks[i]) ? q.blanks[i] : [];
        const hit = expectedList.some(ans => eqLoose(inputs[i], ans));
        if (!hit) return { ok:false, detail:`Blank ${i+1} incorrect.` };
      }
      return { ok:true, detail:"" };
    }

    function sanitizeSavedSets(){
      // 非破坏性：storage key（amt_*）被同源下的所有题库单文件共用，旧实现会把
      // “不属于当前题库”的错题/收藏/做题次数删掉并回存——打开 B 库就清空 A 库的记录
      // （GitHub Pages 同源必中招，Chrome 的 file:// 也共享存储）。
      // 计数与视图本来就按“与当前题库求交集”计算（见 updateButtons/getWrongQuestions），
      // 外库 id 留在集合里无害，因此这里只做类型清洗，不再按当前题库过滤、不回写删除。
      const nextCountMap = {};
      for(const [id, count] of Object.entries(mapCountMap(attemptCountMap))){
        if(Number(count) > 0) nextCountMap[id] = Number(count);
      }
      attemptCountMap = nextCountMap;
    }

    /* ---- 自动生成筛选（统一按前缀） ---- */
    function prettifyPrefix(p){if(/^quiz\d+$/i.test(p))return p.replace(/quiz(\d+)/i,"Quiz $1");if(/^day\d+$/i.test(p))return p.replace(/day(\d+)/i,"Day $1");return p.replace(/_/g," ").replace(/\b\w/g,s=>s.toUpperCase())}
    function deriveCategoriesFromQuestions(){
      const map=new Map();
      for(const q of QUESTION_BANK){
        const banks = Array.isArray(q.banks) ? q.banks : getBanks(q);
        for(const prefix of banks){
          if(!prefix || map.has(prefix)) continue;
          map.set(prefix, prettifyPrefix(prefix));
        }
      }
      const cats = Array.from(map,([id,label])=>({id,label}));
      // Group filters by subject/course first (e.g. all 205 banks, then 215), then order
      // within each course. Course = the 3-digit code in the bank id (ass_7_205_Finishes -> 205).
      const courseOf=id=>{const m=String(id).match(/\d{3}/);return m?m[0]:"￿";};
      cats.sort((a,b)=>{
        const ca=courseOf(a.id), cb=courseOf(b.id);
        if(ca!==cb) return ca.localeCompare(cb, undefined, {numeric:true});
        return a.id.localeCompare(b.id, undefined, {numeric:true, sensitivity:'base'});
      });
      return cats;
    }
    function initFilters(){
      const cats=deriveCategoriesFromQuestions();
      const container=document.getElementById("filter-container");
      container.innerHTML=cats.map(c=>`<label class="filter-label"><input type="checkbox" class="bank-filter" value="${c.id}" checked>${c.label}</label>`).join("");
    }
    function toggleFilters(check){document.querySelectorAll(".bank-filter").forEach(cb=>cb.checked=check)}
    function getSelectedPrefixes(){return Array.from(document.querySelectorAll(".bank-filter:checked")).map(cb=>cb.value)}

    /* ------------------ 图片渲染（支持多图/单图） ------------------ */
    function renderImgs(img){
      if(!img) return '';
      const arr = Array.isArray(img) ? img : [img];
      return arr.map(src => `<div class="img-wrap"><img src="${src}" alt="figure" loading="lazy" decoding="async"></div>`).join('');
    }

    /* ------------------ 渲染与交互 ------------------ */
    function ensureState(q){
      return uiState[q.id] || (uiState[q.id] = {
        selectedIndex:null,
        selectedSet:new Set(),
        fillInputs: Array.isArray(q.blanks) ? Array(q.blanks.length).fill("") : [],
        submitted:false,
        feedbackHTML:"",
        showKeys:false
      });
    }

    function escapeAttr(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;");
    }

    let hydratedSet = new Set();
    let hydrateObserver = null;
    function hydrateOne(q){
      if (!q || hydratedSet.has(q.id)) return;
      const st = ensureState(q);
      hydrateQuestionText(q, st);
      renderAnswerArea(q, st);
      if (st.submitted && isFill(q) && st.showKeys) renderKeysPanel(q.id);
      hydratedSet.add(q.id);
    }
    function ensureHydrated(qId){
      if (hydratedSet.has(qId)) return;
      const q = getQ(qId);
      if (q) hydrateOne(q);
    }
    function render(questions){
      currentQuestions=questions;
      const wrap=document.getElementById("quiz");
      if(!questions.length){
        wrap.innerHTML=`<div style="padding:20px;text-align:center;color:var(--muted);">${T('empty_list')}</div>`;
        updateStats();
        return;
      }
      let html="";
      if(viewMode!=='all'){
        let bulkBtn='';
        if(viewMode==='wrong') bulkBtn=`<button class="btn" onclick="removeAllFromWrong()" data-testid="remove-all-wrong-btn">${T('remove_all_wrong')}</button>`;
        else if(viewMode==='star') bulkBtn=`<button class="btn" onclick="clearAllStars()" data-testid="clear-all-stars-btn">${T('clear_all_stars')}</button>`;
        html+=`<div class="toolbar"><button class="btn" onclick="clearCurrentSelections()">${T('clear_choices')}</button>${bulkBtn}</div>`;
      }

      for(let i=0;i<questions.length;i++){
        const q=questions[i];
        const isStar = starred.has(q.id);
        const st = ensureState(q);

        const showKeyBtn = !isEssay(q)
          ? `<button class="btn" id="keysbtn-${q.id}" onclick="toggleKeys('${q.id}')" style="display:${st.submitted ? 'block' : 'none'}">
              ${st.showKeys ? T('hide_keys') : T('show_keys')}
            </button>`
          : ``;

        html+=`
        <div class="question-card" id="card-${q.id}" data-qid="${q.id}">
          <div class="question-header">
            <div class="header-left">
              <span class="q-badge">${T('question_badge',{n:i+1})}</span>
              <button class="star-btn ${isStar ? "starred" : ""}"
                      onclick="toggleStar('${q.id}')"
                      aria-label="${isStar ? T('unstar') : T('star')}"
                      title="${isStar ? T('unstar') : T('star')}">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="question-text" id="qtext-${q.id}"></div>
          ${renderImgs(q.image)}

          <div id="answer-${q.id}"></div>

          <div class="action-bar">
            <button class="btn submit-btn" id="submit-${q.id}" onclick="submitAnswer('${q.id}')" ${st.submitted?'disabled':''}>${st.submitted?T('submitted'):T('submit')}</button>
            <button class="btn redo-btn" id="redo-${q.id}" onclick="redoQuestion('${q.id}')" style="display:${st.submitted?'block':'none'}">${T('redo')}</button>
            ${showKeyBtn}
          </div>

          <div class="feedback ${(st.submitted || st.feedbackHTML)?'visible':''}" id="feedback-${q.id}">${st.feedbackHTML||""}</div>

          <div class="keys-panel" id="keys-${q.id}" style="display:${(st.submitted && st.showKeys && isFill(q)) ? "block" : "none"}"></div>

          <div class="meta">${renderSource(q)}</div>
          ${viewMode==='wrong'?`<div class="mt-2"><button class="btn" onclick="removeFromWrong('${q.id}')">${T('remove_wrong')}</button></div>`:""}
        </div>`;
      }
      wrap.innerHTML=html;

      // Chunked hydration: fill the first screenful now; lazy-hydrate the rest as they near the viewport.
      hydratedSet = new Set();
      if (hydrateObserver){ try{ hydrateObserver.disconnect(); }catch(_e){} hydrateObserver = null; }
      const firstChunk = Math.min(questions.length, 15);
      for (let i=0;i<firstChunk;i++){ hydrateOne(questions[i]); }
      const rest = questions.slice(firstChunk);
      if (rest.length){
        if (typeof IntersectionObserver !== "undefined"){
          hydrateObserver = new IntersectionObserver((entries)=>{
            for (const e of entries){
              if (e.isIntersecting){
                const id = e.target.getAttribute("data-qid");
                if (hydrateObserver) hydrateObserver.unobserve(e.target);
                if (id) ensureHydrated(id);
              }
            }
          }, { rootMargin: "800px 0px" });
          for (const q of rest){ const c = document.getElementById("card-" + q.id); if (c) hydrateObserver.observe(c); }
        } else {
          for (const q of rest){ hydrateOne(q); }
        }
      }

      updateStats();
    }

    function hydrateQuestionText(q, st){
      const el = document.getElementById(`qtext-${q.id}`);
      if (!el) return;

      if (isFill(q) && typeof q.question_html === "string" && q.question_html.trim()){
        el.innerHTML = q.question_html;
      } else {
        el.textContent = q.question || "";
      }

      if (isFill(q)){
        hydrateInlineBlanks(q, st, el);
      }
    }

    function hydrateInlineBlanks(q, st, scopeEl){
      const n = Array.isArray(q.blanks) ? q.blanks.length : 0;
      if (!n) return;

      if (!Array.isArray(st.fillInputs) || st.fillInputs.length !== n){
        st.fillInputs = Array(n).fill("");
      }

      const blanks = Array.from(scopeEl.querySelectorAll("input.qb-blank, input[data-blank].qb-blank, input[data-blank]"));
      if (!blanks.length){
        // no inline blanks; we'll fallback to answer-area later
        return;
      }

      blanks.forEach((inp, i) => {
        // ensure class
        inp.classList.add("qb-blank");

        // map index by data-blank (1-based) if present
        let bi = i;
        const db = inp.getAttribute("data-blank");
        if (db && /^\d+$/.test(db)) bi = Math.max(0, parseInt(db,10)-1);

        if (bi >= n) return; // ignore extra inputs

        inp.value = st.fillInputs[bi] ?? "";
        inp.disabled = !!st.submitted;
        inp.placeholder = "Type…";

        inp.addEventListener("input", () => {
          if (st.submitted) return;
          st.fillInputs[bi] = inp.value;
          maybeAutoSubmit(q.id);
        });
      });
    }

    function renderAnswerArea(q, st){
      const box = document.getElementById(`answer-${q.id}`);
      if (!box) return;

      if (isFill(q)) {
        // If question_html has blanks, no separate area needed.
        const qtext = document.getElementById(`qtext-${q.id}`);
        const hasInline = qtext && qtext.querySelector("input.qb-blank, input[data-blank]");
        if (hasInline) { box.innerHTML = ""; return; }

        // Fallback: render fill inputs below
        const n = Array.isArray(q.blanks) ? q.blanks.length : 0;
        if (!Array.isArray(st.fillInputs) || st.fillInputs.length !== n){
          st.fillInputs = Array(n).fill("");
        }
        const disabled = st.submitted ? "disabled" : "";
        let inner = `<div class="fill-area" id="fill-${q.id}">`;
        for (let i=0;i<n;i++){
          const v = (st.fillInputs[i] ?? "");
          inner += `
            <div class="fill-row">
              <div class="fill-label">Blank ${i+1}</div>
              <input class="fill-input" ${disabled}
                     value="${escapeAttr(v)}"
                     oninput="onFillInput('${q.id}', ${i}, this.value)"
                     placeholder="Type your answer...">
            </div>`;
        }
        inner += `</div>`;
        box.innerHTML = inner;
        return;
      }

      if (isEssay(q)) {
        box.innerHTML = `<div class="meta">${T('essay_note')}</div>`;
        return;
      }

      // choice question
      const ul = document.createElement('ul');
      ul.className = 'choices';
      const disabled = st.submitted ? 'disabled' : '';
      for(let i=0;i<(q.choices||[]).length;i++){
        ul.insertAdjacentHTML('beforeend',
          `<li class="choice-item"><button class="choice-btn ${disabled}" onclick="selectChoice('${q.id}',${i})">${String.fromCharCode(65+i)}. ${q.choices[i]}</button></li>`
        );
      }
      box.innerHTML = "";
      box.appendChild(ul);

      // restore selected state
      const btns = ul.querySelectorAll('.choice-btn');
      if (isMulti(q)) {
        const sel = st.selectedSet || new Set();
        btns.forEach((b, idx) => { if (sel.has(idx)) b.classList.add('selected'); });
      } else if (st.selectedIndex !== null) {
        if (btns[st.selectedIndex]) btns[st.selectedIndex].classList.add('selected');
      }

      if (st.submitted && st.showKeys) {
        btns.forEach((b, idx) => {
          const correct = isMulti(q) ? (Array.isArray(q.answers) && q.answers.indexOf(idx) !== -1) : (idx === q.answer);
          if (correct) { b.classList.remove('selected'); b.classList.add('is-correct'); }
          else if (b.classList.contains('selected')) { b.classList.remove('selected'); b.classList.add('is-wrong'); }
        });
      }
    }

    function onFillInput(qId, blankIndex, value){
      const q = getQ(qId);
      const st = ensureState(q);
      if (st.submitted) return;
      if (!Array.isArray(st.fillInputs)) st.fillInputs = [];
      st.fillInputs[blankIndex] = value;
      maybeAutoSubmit(qId);
    }

    function selectChoice(qId, index){
      const q = getQ(qId);
      const st = ensureState(q);
      if (st.submitted) return;
      if (isFill(q) || isEssay(q)) return;

      const btns = document.getElementById(`answer-${qId}`).querySelectorAll('.choice-btn');

      if (isMulti(q)) {
        if (st.selectedSet.has(index)) { st.selectedSet.delete(index); }
        else { st.selectedSet.add(index); }
        btns[index].classList.toggle('selected');
      } else {
        st.selectedIndex = index;
        btns.forEach(b => b.classList.remove('selected'));
        btns[index].classList.add('selected');
      }
      maybeAutoSubmit(qId);
    }

    function syncQuestionUI(qId){
      const q = getQ(qId);
      if(!q) return;
      const st = ensureState(q);
      hydrateQuestionText(q, st);
      renderAnswerArea(q, st);

      const fb=document.getElementById(`feedback-${qId}`);
      if(fb){
        fb.innerHTML = st.feedbackHTML || '';
        fb.classList.toggle('visible', !!st.feedbackHTML || !!st.submitted);
      }

      const sub=document.getElementById(`submit-${qId}`);
      if(sub){
        sub.textContent = st.submitted ? T('submitted') : T('submit');
        sub.disabled = !!st.submitted;
      }

      const redo=document.getElementById(`redo-${qId}`);
      if(redo) redo.style.display = st.submitted ? 'block' : 'none';

      const kp = document.getElementById(`keys-${qId}`);
      if (kp) {

      }

      if (kb) {
        kb.style.display = st.submitted ? 'block' : 'none';
        kb.textContent = st.showKeys ? T('hide_keys') : T('show_keys');

    function resetQuestionStateForRedo(qId, opts={}){
      const q = getQ(qId);
      const st = ensureState(q);
      st.submitted = false;
      st.selectedIndex = null;
      st.selectedSet = new Set();
      st.showKeys = false;
      st.feedbackHTML = opts.keepFeedback ? String(opts.keepFeedback) : '';
      if (isFill(q)) {
        const n = Array.isArray(q.blanks) ? q.blanks.length : 0;
        st.fillInputs = Array(n).fill('');
      }
      syncQuestionUI(qId);
      return st;
    }

    function submitAnswer(qId){
      const q = getQ(qId);
      const st = ensureState(q);
      if(st.submitted) return;
      ensureHydrated(qId);

      // 校验是否填写/选择
      if (isFill(q)) {
        const n = Array.isArray(q.blanks) ? q.blanks.length : 0;
        if (!n) { alert("This fill question has no blanks defined."); return; }
        if (!Array.isArray(st.fillInputs) || st.fillInputs.length !== n) { alert("Please fill all blanks!"); return; }
        for (let i=0;i<n;i++){
          if (!String(st.fillInputs[i] ?? "").trim()) { alert("Please fill all blanks!"); return; }
        }
      } else if (isEssay(q)) {
        alert("Essay question: no auto grading in this frame.");
        return;
      } else {
        if (isMulti(q)) {
          if (!st.selectedSet || st.selectedSet.size === 0) { alert("Please select at least one answer!"); return; }
        } else {
          if (st.selectedIndex === null) { alert("Please select an answer first!"); return; }
        }
      }

      let ok=false;
      if (isFill(q)) {
        const res = checkFill(q, st.fillInputs);
        ok = !!res.ok;
      } else if (isMulti(q)) {
        const expected = q.answers.slice().sort((a,b)=>a-b);
        ok = setEqualsArray(st.selectedSet, expected);
      } else {
        ok = (st.selectedIndex === q.answer);
      }

      const firstScoredAttempt = !answeredOnce.has(qId);
      if(firstScoredAttempt){
        answeredOnce.add(qId);
        totalAttempts++;
        bumpAttemptCount(qId);
        if(ok) totalCorrect++;
        else { wrongSet.add(qId); saveSet(WRONG_KEY,wrongSet); }
      }
      const html=ok ? `<div class="correct">${T('correct_fb')}</div>` : `<div class="wrong">${T('wrong_fb')}</div>`;
      st.submitted=true;
      st.feedbackHTML=html;
      syncQuestionUI(qId);
      updateStats();
    }

    function toggleKeys(qId){
      const q = getQ(qId);
      const st = ensureState(q);
      if (isEssay(q)) return;
      if (!st.submitted) return;

      st.showKeys = !st.showKeys;

      const btn = document.getElementById(`keysbtn-${qId}`);
      if (btn) btn.textContent = st.showKeys ? T('hide_keys') : T('show_keys');

      if (isFill(q)) {
        const panel = document.getElementById(`keys-${qId}`);
        if (!panel) return;
        panel.style.display = st.showKeys ? "block" : "none";
        if (st.showKeys) renderKeysPanel(qId);
      } else {
        renderAnswerArea(q, st);
      }
    }

    function renderKeysPanel(qId){
      const q = getQ(qId);
      const panel = document.getElementById(`keys-${qId}`);
      if (!panel || !isFill(q)) return;

      let html = `<div class="keys-title">${T('keys_title')}</div>`;

      // Prefer answer_sets if present (multiple combinations)
      if (Array.isArray(q.answer_sets) && q.answer_sets.length){
        html += `<div class="keys-row">${T('keys_sets_hint')}</div>`;
        q.answer_sets.forEach((set, si) => {
          const parts = (set || []).map((v, i) => {
            if (Array.isArray(v)) {
              const chips = v.map(x=>`<span class="keys-chip">${escapeAttr(x)}</span>`).join("");
              return `<div class="keys-row"><strong>${T('set_label')} ${si+1} · ${T('blank_label')} ${i+1}:</strong> ${chips}</div>`;
            }
            return `<div class="keys-row"><strong>${T('set_label')} ${si+1} · ${T('blank_label')} ${i+1}:</strong> <span class="keys-chip">${escapeAttr(v)}</span></div>`;
          }).join("");
          html += parts;
        });
        panel.innerHTML = html;
        return;
      }

      const blanks = Array.isArray(q.blanks) ? q.blanks : [];
      blanks.forEach((arr, i) => {
        const list = (Array.isArray(arr) ? arr : []).filter(Boolean);
        const chips = list.length
          ? list.map(x=>`<span class="keys-chip">${escapeAttr(x)}</span>`).join("")
          : `<span class="keys-chip">${T('no_key')}</span>`;
        html += `<div class="keys-row"><strong>${T('blank_label')} ${i+1}:</strong> ${chips}</div>`;
      });

      panel.innerHTML = html;
    }

    function computePracticeWeight(q){
      const answered = getAttemptCount(q && q.id);
      return 1 / (1 + answered);
    }
    function weightedSampleWithoutReplacement(pool, limit){
      const items = Array.isArray(pool) ? pool.slice() : [];
      const scored = items.map(q => {
        const weight = Math.max(0.0001, Number(computePracticeWeight(q) || 0.0001));
        const u = Math.random() || 1e-9;
        const key = Math.log(u) / weight;
        return { q, key };
      });
      scored.sort((a,b) => b.key - a.key);
      return scored.slice(0, Math.max(0, limit|0)).map(x => x.q);
    }

    function updateButtons(){
      const bw=document.getElementById('btn-wrong'), bs=document.getElementById('btn-star'), bb=document.getElementById('btn-back'), br=document.getElementById('btn-random150'), br150=document.getElementById('btn-back150');
      const scopeQuestions = getCurrentScopeQuestions();

      const randomPoolCount = (viewMode === 'random150' && Array.isArray(activeRandom150SourcePool) && activeRandom150SourcePool.length)
        ? activeRandom150SourcePool.length
        : currentPageCount;
      const wrongScopeCount = scopeQuestions.reduce((n,q)=> n + (wrongSet.has(q.id)?1:0), 0);
      const wrongTotalCount = QUESTION_BANK.reduce((n,q)=> n + (wrongSet.has(q.id)?1:0), 0);
      const starScopeCount  = scopeQuestions.reduce((n,q)=> n + (starred.has(q.id)?1:0), 0);

        bs.textContent=T('star_only',{n:starScopeCount});

        bs.title = starTotalCount === starScopeCount
          ? T('star_title_same',{n:starScopeCount})
          : T('star_title_more',{n:starScopeCount,total:starTotalCount});
      }
      if(bb){
        bb.disabled = (viewMode==='all');
        bb.title = T('back_all_title');
      }
      // 范围不足 150 题时整组按钮直接隐藏（而不是置灰）
      const has150Draw = Array.isArray(activeRandom150Questions) && activeRandom150Questions.length > 0;
      const canDraw150 = randomPoolCount > 150;
      if(br150){
        br150.hidden = !has150Draw;

      }
      if(br){
        br.hidden = !canDraw150 && !has150Draw && viewMode !== 'random150';

    function updateProgress(){
      const bar = document.getElementById("quiz-progress");
      if (!bar) return;
      const list = Array.isArray(currentQuestions) ? currentQuestions : [];
      const total = list.length;
      if (!total){ bar.hidden = true; return; }
      let done = 0;
      for (const q of list){ const st = uiState[q.id]; if (st && st.submitted) done++; }
      const pct = Math.round((done / total) * 100);
      bar.hidden = false;
      const fill = document.getElementById("qp-fill"); if (fill) fill.style.width = pct + "%";
      const txt = document.getElementById("qp-text");
      if (txt){
        if (uiLang === "zh") txt.textContent = "已答 " + done + " / " + total + " · " + pct + "%";
        else if (uiLang === "es") txt.textContent = done + " / " + total + " respondidas · " + pct + "%";
        else txt.textContent = done + " / " + total + " answered · " + pct + "%";
      }
      const nextBtn = document.getElementById("qp-next");
      if (nextBtn){
        nextBtn.disabled = (done >= total);
        nextBtn.textContent = (uiLang === "zh") ? "跳到下一道未答 →" : (uiLang === "es") ? "Siguiente sin responder →" : "Next unanswered →";
      }
    }
    function jumpToNextUnanswered(){
      const list = Array.isArray(currentQuestions) ? currentQuestions : [];
      for (const q of list){
        const st = uiState[q.id];
        if (!st || !st.submitted){
          ensureHydrated(q.id);
          const card = document.getElementById("card-" + q.id);
          if (card && typeof card.scrollIntoView === "function"){
            try{ card.scrollIntoView({ behavior:"smooth", block:"center" }); }catch(_e){ try{ card.scrollIntoView(); }catch(_e2){} }
          }
          return;
        }

      if (typeof window.scrollTo === "function"){ try{ window.scrollTo({ top:0, behavior:"smooth" }); }catch(_e){ try{ window.scrollTo(0,0); }catch(_e2){} } }

    function updateStats(){

      const wrongScopeCount = scopeQuestions.reduce((n,q)=> n + (wrongSet.has(q.id)?1:0), 0);
      const totalNow = (currentQuestions && currentQuestions.length) ? currentQuestions.length : 0;
      if(totalAttempts===0){el.textContent=T('stats_none',{total:totalNow,wrong:wrongScopeCount});}
      else{const acc=((totalCorrect/totalAttempts)*100).toFixed(1); el.textContent=T('stats_score',{total:totalNow,correct:totalCorrect,attempts:totalAttempts,acc:acc,wrong:wrongScopeCount});}

    function maybeAutoSubmit(qId){
      if(!autoSubmit) return;
      const q = getQ(qId);
      const st = ensureState(q);
      if(st.submitted) return;
      if(isEssay(q)) return;

      // Fill: auto-submit when all blanks are filled (debounced).
      if(isFill(q)){
        const n = Array.isArray(q.blanks) ? q.blanks.length : 0;
        if(!n) return;
        if(!Array.isArray(st.fillInputs) || st.fillInputs.length !== n) return;
        if(st.fillInputs.some(v=>!String(v ?? "").trim())) return;

        if(st._autoTimer) clearTimeout(st._autoTimer);
        st._autoTimer = setTimeout(() => {
          if(autoSubmit && !st.submitted) submitAnswer(qId);
        }, 350);
        return;
      }

      // Choice:
      if(isMulti(q)){
        const expected = Array.isArray(q.answers) ? q.answers.length : 0;
        if(!expected) return;
        if(!st.selectedSet || st.selectedSet.size !== expected) return;
        submitAnswer(qId);
        return;
      }

      if(st.selectedIndex === null) return;
      submitAnswer(qId);
    }

    function shuffleAndRender(){
      resetSessionScoreState();
      viewMode='all';
      specialFilterSource='base';
      activeRandom150Questions=null;
      activeRandom150SourcePool=null;
      const prefixes=getSelectedPrefixes();
      const subset=QUESTION_BANK.filter(q=>prefixes.some(p=> (Array.isArray(q.banks)?q.banks.includes(p):getBanks(q).includes(p)) ));
      shuffle(subset);
      baseQuestions = subset.slice();
      render(baseQuestions);
      updateButtons();
    }

    /* ------------------ 启动 ------------------ */
    function startQuiz(rawQuestions){
      RAW_QUESTION_BANK = Array.isArray(rawQuestions) ? rawQuestions : [];
      const deduped = dedupeQuestionBank(RAW_QUESTION_BANK);
      QUESTION_BANK = Array.isArray(deduped && deduped.bank) ? deduped.bank : [];
      ID_ALIAS = (deduped && deduped.alias) || {};

      starred=mapIds(loadSet(STAR_KEY));
      wrongSet=mapIds(loadSet(WRONG_KEY));
      attemptCountMap=mapCountMap(loadCountMap(ATTEMPT_COUNT_KEY));

      // 一次性迁移：命名空间 key 还是空的、但旧共享 key（amt_*）里有属于本题库的记录时，
      // 把它们搬过来（只搬本题库的 id，不动旧 key 本身）。
      if (STORAGE_NS !== "amt" && !starred.size && !wrongSet.size && !Object.keys(attemptCountMap).length){
        try{
          const ownIds = new Set(QUESTION_BANK.map(q=>q.id));
          const legacyStar = mapIds(loadSet("amt_starred_questions"));
          const legacyWrong = mapIds(loadSet("amt_wrong_questions"));
          const legacyCounts = mapCountMap(loadCountMap("amt_attempt_count_map_v1"));
          for(const id of legacyStar) if(ownIds.has(id)) starred.add(id);
          for(const id of legacyWrong) if(ownIds.has(id)) wrongSet.add(id);
          for(const [id,c] of Object.entries(legacyCounts)) if(ownIds.has(id) && Number(c)>0) attemptCountMap[id]=Number(c);
          if(starred.size) saveSet(STAR_KEY, starred);
          if(wrongSet.size) saveSet(WRONG_KEY, wrongSet);
          if(Object.keys(attemptCountMap).length) saveCountMap(ATTEMPT_COUNT_KEY, attemptCountMap);
        }catch(_e){ /* 迁移失败不阻塞做题 */ }
      }
      answeredOnce=new Set();
      uiState={};
      currentQuestions=[];
      baseQuestions=[];
      activeRandom150Questions=null;
      activeRandom150SourcePool=null;
      totalAttempts=0;
      totalCorrect=0;
      viewMode='all';
      specialFilterSource='base';
      autoSubmit = loadBool(AUTO_KEY, false);

      initFilters();
      sanitizeSavedSets();
      updateAutoBtn();
      shuffleAndRender();
      setTimeout(maybeStartTutorial, 350);
    }

        return !!el && !el.hidden;
      });
    }
    function tutorialClearHighlight(){
      if (tutorialHighlighted){ tutorialHighlighted.classList.remove("tut-highlight"); tutorialHighlighted = null; }
    }
    function tutorialRender(){
      const steps = tutorialActiveSteps();
      if (!steps.length){ endTutorial(); return; }
      if (tutorialStepIdx >= steps.length) tutorialStepIdx = steps.length - 1;
      const step = steps[tutorialStepIdx];
      document.getElementById("tut-step-label").textContent = `Step ${tutorialStepIdx + 1} / ${steps.length}`;
      document.getElementById("tut-title").textContent = step.title;
      document.getElementById("tut-body").textContent = step.body;
      document.getElementById("tut-back").hidden = tutorialStepIdx === 0;
      document.getElementById("tut-next").textContent = tutorialStepIdx === steps.length - 1 ? "Done" : "Next";
      tutorialClearHighlight();
      if (step.sel){
        const el = document.querySelector(step.sel);
        if (el && !el.hidden){
          el.classList.add("tut-highlight");
          tutorialHighlighted = el;
          try{ el.scrollIntoView({ behavior:"smooth", block:"center" }); }catch(_e){}
        }
      }
    }
    function tutorialMove(delta){
      const steps = tutorialActiveSteps();
      const next = tutorialStepIdx + delta;
      if (next >= steps.length){ endTutorial(); return; }
      tutorialStepIdx = Math.max(0, next);
      tutorialRender();
    }
    // 手动打开教程（标题栏「?」按钮）；首次自动弹出走 maybeStartTutorial
    function openTutorial(){
      const overlay = document.getElementById("qb-tutorial");
      if (!overlay) return;
      tutorialStepIdx = 0;
      overlay.hidden = false;
      tutorialRender();
    }
    function maybeStartTutorial(){
      try{ if (localStorage.getItem(TUTORIAL_KEY)) return; }catch(_e){ return; }
      openTutorial();
    }
    function endTutorial(){
      const overlay = document.getElementById("qb-tutorial");
      if (overlay) overlay.hidden = true;
      tutorialClearHighlight();
      try{ localStorage.setItem(TUTORIAL_KEY, "1"); }catch(_e){}
    }

    function showQuizApp(){
      const app = document.getElementById("quizApp");
      const unlock = document.getElementById("unlock-panel");
      if(app) app.hidden = false;
      if(unlock) unlock.hidden = true;
    }

    function showUnlockPanel(){
      const app = document.getElementById("quizApp");
      const unlock = document.getElementById("unlock-panel");
      if(app) app.hidden = true;
      if(unlock) unlock.hidden = false;
      queueMicrotask(() => {
        const input = document.getElementById("legacy-password");
        if(input) input.focus();
      });
    }

    async function unlockProtectedLegacyBank(){
      const input = document.getElementById("legacy-password");
      const password = input ? input.value : "";
      if(!String(password || "").trim()){
        setUnlockError(T('unlock_need_pw'));
        return;
      }
      setUnlockBusy(true);
      setUnlockError("");
      try{
        const rawQuestions = await decryptLegacyBank((LEGACY_BANK_PAYLOAD && LEGACY_BANK_PAYLOAD.envelope) || REMOTE_ENVELOPE, password);
        showQuizApp();
        startQuiz(rawQuestions);
      }catch(e){
        setUnlockError(e && e.message ? e.message : T('unlock_fail'));
      }finally{
        setUnlockBusy(false);
      }
    }

    /* ---- All Banks 合并页：先选题库（公开勾选 / 加密解锁），按所选集合现场拉取合并 ---- */
    let AB_PUBLIC_ENTRIES = [];
    let AB_ENTRIES = [];
    const AB_UNLOCKED = new Map(); // bankId -> questions[]
    function showBankSelectPrompt(publicEntries, protectedEntries){
      AB_PUBLIC_ENTRIES = publicEntries;
      AB_ENTRIES = protectedEntries;
      AB_UNLOCKED.clear();
      const pubList = document.getElementById("ab-public-list");
      pubList.innerHTML = publicEntries.map(e => `
        <label style="display:flex;gap:8px;align-items:center;cursor:pointer">
          <input type="checkbox" data-ab-pub value="${escapeAttr(e.id)}" checked data-testid="ab-public-check">
          <strong>${escapeAttr(e.title || e.id)}</strong>
          <span class="meta">${escapeAttr(T('ab_count', { n: e.question_count ?? '?' }))}</span>
        </label>`).join("");
      const list = document.getElementById("ab-list");
      list.innerHTML = protectedEntries.map(e => `
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap" data-ab-id="${escapeAttr(e.id)}">
          <strong style="min-width:150px">🔒 ${escapeAttr(e.title || e.id)}</strong>
          <input type="password" class="unlock-input" data-ab-pw placeholder="${escapeAttr(T('unlock_placeholder'))}" style="flex:1;min-width:150px" data-testid="ab-pw-input">
          <button class="btn" data-ab-btn onclick="abUnlock('${escapeAttr(e.id)}')" data-testid="ab-unlock-btn">${escapeAttr(T('ab_unlock'))}</button>
          <span class="meta" data-ab-status></span>
        </div>`).join("");
      const msg = document.getElementById("ab-msg");
      if (msg) msg.hidden = true;
      document.getElementById("qb-allbanks").hidden = false;
    }
    async function abUnlock(id){
      const row = document.querySelector('#ab-list [data-ab-id="' + id + '"]');
      const entry = AB_ENTRIES.find(e => e && e.id === id);
      if (!row || !entry) return;
      const pwInput = row.querySelector("[data-ab-pw]");
      const btn = row.querySelector("[data-ab-btn]");
      const status = row.querySelector("[data-ab-status]");
      const password = pwInput ? pwInput.value : "";
      if (!String(password || "").trim()){
        status.style.color = "var(--danger-ink)";
        status.textContent = T("unlock_need_pw");
        return;
      }
      if (btn) btn.disabled = true;
      try{
        const res = await fetch(entry.payload, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const envelope = JSON.parse(await res.text());
        const qs = await decryptLegacyBank(envelope, password);
        AB_UNLOCKED.set(id, Array.isArray(qs) ? qs : []);
        if (pwInput) pwInput.disabled = true;
        if (btn) btn.hidden = true;
        status.style.color = "var(--success-ink)";
        status.textContent = T("ab_included", { n: (qs || []).length });
      }catch(_e){
        status.style.color = "var(--danger-ink)";
        status.textContent = T("ab_wrong");
        if (btn) btn.disabled = false;
      }
    }
    function abShowMsg(text){
      const msg = document.getElementById("ab-msg");
      if (!msg) return;
      msg.textContent = text || "";
      msg.hidden = !text;
    }
    async function startAllBanksMerged(){
      const checkedIds = Array.from(document.querySelectorAll('#ab-public-list [data-ab-pub]:checked')).map(el => el.value);
      const selectedPublic = AB_PUBLIC_ENTRIES.filter(e => checkedIds.includes(e.id));
      if (!selectedPublic.length && !AB_UNLOCKED.size){
        abShowMsg(T("ab_none"));
        return;
      }
      const startBtn = document.getElementById("ab-start");
      if (startBtn) startBtn.disabled = true;
      abShowMsg("");
      try{
        // 按所选公开库逐个拉取（加密库已在解锁时拿到明文）；startQuiz 的运行时去重负责融合
        const fetched = await Promise.all(selectedPublic.map(async (e) => {
          try{
            const res = await fetch(e.json, { cache: "no-store" });
            if (!res.ok) throw new Error("HTTP " + res.status);
            const qs = await res.json();
            return Array.isArray(qs) ? qs : [];
          }catch(_err){
            abShowMsg(T("ab_load_fail", { id: e.id }));
            return null;
          }
        }));
        if (fetched.some(x => x === null)) return; // 有库拉取失败：留在对话框让用户重试/取消勾选
        let qs = [];
        for (const arr of fetched) qs = qs.concat(arr);
        for (const arr of AB_UNLOCKED.values()) qs = qs.concat(arr);
        document.getElementById("qb-allbanks").hidden = true;
        showQuizApp();
        startQuiz(qs);
      }finally{
        if (startBtn) startBtn.disabled = false;
      }
    }

    // 站点模式：页面大标题 = 题库名（与目录卡片一致）。摘掉 data-i18n，语言切换不再覆盖它。
    function setPageHeading(text){
      const h1 = document.querySelector('#quizApp h1');
      if (!h1 || !text) return;
      h1.removeAttribute('data-i18n');
      h1.textContent = text;
    }

    // 通用播放器（remote 模式）的数据装载：banks/index.json 找条目 → 拉对应文件
    let REMOTE_ENVELOPE = null; // 密码库的密文信封（解锁函数读它）
    async function bootstrapRemoteBank(){
      const id = String(new URLSearchParams(location.search).get("bank") || "").trim();
      const fail = (msg) => {
        showQuizApp();
        document.getElementById("quiz").innerHTML =
          '<div style="padding:24px;text-align:center;color:var(--muted)">' + msg +
          '<br><a href="./" style="color:var(--brand)">← Back to catalog / 返回目录</a></div>';
      };
      if(!/^[A-Za-z0-9_-]{1,64}$/.test(id)){ fail("Missing or invalid ?bank= id"); return; }
      let entry = null;
      let manifestList = [];
      try{
        const res = await fetch("banks/index.json", { cache: "no-store" });
        const manifest = await res.json();
        manifestList = Array.isArray(manifest) ? manifest : [];
        entry = manifestList.find(e => e && e.id === id) || null;
      }catch(_e){}
      if(!entry){ fail("Bank not found: " + id); return; }
      setStorageNamespace(id);
      if(entry.title){
        document.title = entry.title;
        setPageHeading(entry.title);
      }
      try{
        // 合并练习页（虚拟入口，无预生成数据）：先弹「选择题库」，按所选集合现场拉取合并
        if (id === "all-banks"){
          const publicEntries = manifestList.filter(e => e && e.id !== "all-banks" && e.mode !== "protected" && e.json);
          const protectedEntries = manifestList.filter(e => e && e.mode === "protected" && e.payload);
          if (!publicEntries.length && !protectedEntries.length){ fail("Bank not found: " + id); return; }
          showBankSelectPrompt(publicEntries, protectedEntries);
          return;
        }
        if(entry.mode === "protected"){
          const res = await fetch(entry.payload, { cache: "no-store" });
          if(!res.ok) throw new Error("HTTP " + res.status);
          REMOTE_ENVELOPE = JSON.parse(await res.text());
          showUnlockPanel();
          return;
        }
        const res = await fetch(entry.json, { cache: "no-store" });
        if(!res.ok) throw new Error("HTTP " + res.status);
        const questions = await res.json();
        showQuizApp();
        startQuiz(Array.isArray(questions) ? questions : []);
      }catch(e){
        fail("Failed to load bank data (" + (e && e.message ? e.message : String(e)) + ")");
      }
    }

    function bootstrapLegacyBank(){
      const payload = LEGACY_BANK_PAYLOAD;
      // 站点模式（player.html / local.html）显示「返回目录」；提取器导出的独立单文件没有目录，保持隐藏
      if (payload && (payload.mode === "remote" || payload.mode === "local-bank")){
        const b1 = document.getElementById("back-catalog");
        const b2 = document.getElementById("back-catalog-unlock");
        if (b1) b1.hidden = false;
        if (b2) b2.hidden = false;
      }
      const unlockBtn = document.getElementById("legacy-unlock-btn");
      const passwordInput = document.getElementById("legacy-password");
      if(unlockBtn) unlockBtn.addEventListener("click", unlockProtectedLegacyBank);
      if(passwordInput){
        passwordInput.addEventListener("keydown", event => {
          if(event.key === "Enter"){
            event.preventDefault();
            unlockProtectedLegacyBank();
          }
        });
      }

      if(payload && payload.mode === "protected"){
        showUnlockPanel();
        return;
      }

      // player.html（通用播放器）：题库不内嵌，按 ?bank=<id> 从站点 banks/ 文件夹拉取
      // （公开 = banks/<id>.json；密码保护 = banks/<id>.qbpack → 先解锁再做题）。
      if(payload && payload.mode === "remote"){
        bootstrapRemoteBank();
        return;
      }

      // local.html：题库不内嵌，从浏览器 localStorage 读（目录页「导入 JSON 本地练习」存入），
      // 地址形如 local.html?bank=<id>。每个本地题库有独立存储命名空间 local-<id>。
      if(payload && payload.mode === "local-bank"){
        const localId = String(new URLSearchParams(location.search).get("bank") || "").trim();
        let bank = null;
        try{
          const all = JSON.parse(localStorage.getItem("qb_local_banks_v1") || "{}");
          if (localId && all && typeof all === "object") bank = all[localId];
        }catch(_e){}
        showQuizApp();
        if (bank && Array.isArray(bank.questions) && bank.questions.length){
          setStorageNamespace("local-" + localId.replace(/[^A-Za-z0-9_-]/g, "-").slice(0, 48));
          if (bank.title){
            document.title = bank.title + " · Local";
            setPageHeading(bank.title);
          }
          startQuiz(bank.questions);
        } else {
          document.getElementById("quiz").innerHTML =
            '<div style="padding:24px;text-align:center;color:var(--muted)">' +
            'Local bank not found on this device.<br>本设备上找不到这个本地题库——请回目录页重新导入 JSON。<br>' +
            '<a href="./" style="color:var(--brand)">← Back to catalog / 返回目录</a></div>';
        }
        return;
      }

      showQuizApp();
      startQuiz(Array.isArray(payload) ? payload : (Array.isArray(payload && payload.questions) ? payload.questions : []));
    }

    applyUiLang(); // 先按保存的语言偏好渲染静态文案（默认英文）
    applyThemeIcon();
    bootstrapLegacyBank();
  </script>
</body>
</html>
