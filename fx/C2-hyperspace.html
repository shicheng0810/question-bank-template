<!doctype html>
<!--
  ============================================================================
  名称：C2-hyperspace — AMT 题库站「超空间穿越」粒子背景候选（往炫里做）
  ----------------------------------------------------------------------------
  美学方向（Hyperspace Warp / 曲速跃迁）：
    一片带 3D 景深的星场从消失点向四周加速飞来，营造星际跃迁 / 曲速穿越的
    冲击感。三个观感要素：
      1) 穿越星流：每颗星有 z 深度，按透视投影到屏幕；z 越小越近、越大越亮、
         拖尾越长。星越靠外 / 越近，屏上速度越快，形成「加速飞来」的扑面感。
      2) 速度拖尾光线：每颗星画从「上一帧投影点 → 当前投影点」的一段光线，
         近处更长更亮（曲速光迹），additive 叠加，深色背景下像穿越星海。
      3) 视角跟手 + warp boost：鼠标移动平滑偏移消失点（视角跟随）；
         点击 / 触摸瞬时拉高穿越速度（warp boost）再缓回，给一下爆发。
    亮点用品牌色系，并掺入一点冷暖对比（青蓝 + 暖白/微金），dark 下最出彩。
    始终是背景层：卡片区域（中心带）光迹做衰减，正文实心卡片之上清晰可读。

  实现要点：
    - 纯原生 Canvas 2D + 单个 requestAnimationFrame 循环，零外部依赖 / CDN。
    - 全屏 position:fixed 背景 canvas，pointer-events:none，绝不挡点击。
      （交互在 window 上监听 pointermove/down，故 canvas 不接收事件也能跟手。）
    - 跟随站点主题 html[data-theme="light"|"dark"]，切换时重读 CSS 变量上色。
    - 颜色全部从站点设计令牌派生（--bg / --ink / --brand），并预解析为 RGB。

  性能手法（关键，目标：堆很多 DOM 卡片仍 ~60fps）：
    - 拖尾用「半透明底色矩形每帧淡覆盖」(fade)，而非 clearRect 清屏 —— 既得
      残影曳光，又省去逐星擦除；fade 透明度随 boost 增强（更长的光迹）。
    - 亮点 / 光迹用 globalCompositeOperation='lighter' 做 additive 叠加发光。
    - 粒子数按视口面积自适应并封顶；窄屏 / 移动端进一步降量。
    - 主循环每帧零对象分配：星粒子预分配为定长数组，就地复用 / 回收重生；
      颜色字符串预拼好放入查找表，热路径只做数值运算与 fillStyle 赋值。
    - DPR 封顶 2；resize 防抖 150ms。
    - prefers-reduced-motion → 不进 rAF，只画一帧静止星点（无穿越运动）。
    - document.hidden 停 rAF，visibilitychange 恢复（省电）。

  关键参数（集中在脚本顶部 CONFIG）：
    STAR_AREA_DIVISOR  星密度（面积 / 此值 = 星数）   越小越密
    STAR_MAX           星数硬上限
    BASE_SPEED         基础穿越速度（z 每秒推进比例）
    BOOST_MULT         warp boost 峰值倍率
    BOOST_DECAY        boost 衰减速度（越大回落越快）
    TRAIL_FADE         每帧淡覆盖透明度（越小拖尾越长）
    FOCAL              透视焦距（越大景深越平、越小越夸张）
    PARALLAX           消失点跟随鼠标的最大偏移（占半屏比例）
    SAFE_ZONE          中心安全区半径比例（卡片区域光迹衰减）
  ============================================================================
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>AMT Question Bank · Hyperspace 背景特效候选</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="color-scheme" content="light dark" />
<!-- 与正式站点一致：首屏前同步设定主题，避免闪烁 -->
<script>(function(){try{var k="qb_theme",s=localStorage.getItem(k),m=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches,t=(s==="dark"||s==="light")?s:(m?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
<style>
  /* ---- 设计令牌：直接复用 question-bank 正式站点的配色 ---- */
  :root{
    color-scheme: light;
    --bg:#eef1f6; --card:#ffffff; --card-2:#f6f8fc;
    --ink:#1e293b; --ink-soft:#3b4860; --muted:#64748b;
    --border:#e4e8f0; --border-strong:#d3d9e4;
    --brand:#2563eb; --brand-strong:#1d4ed8; --brand-weak:#eef4ff; --brand-ring:rgba(37,99,235,.18); --on-brand:#ffffff;
    --success:#059669; --success-ink:#047857; --success-bg:#e7f8f0; --success-border:#b6ead2;
    --danger:#dc2626; --danger-ink:#b91c1c; --danger-bg:#fdecec; --danger-border:#f6c9c9;
    --badge-bg:#eef2ff; --badge-ink:#3730a3; --badge-border:#e0e7ff;
    --hover:#f1f5f9; --glow:rgba(37,99,235,.06);
    --shadow-sm:0 1px 2px rgba(16,24,40,.06); --shadow-md:0 8px 22px rgba(16,24,40,.08); --shadow-lg:0 20px 50px rgba(16,24,40,.16);
    --radius:14px; --radius-sm:10px; --radius-xs:8px; --pill:999px;
    /* 粒子专用：从站点令牌派生的 RGB（供 canvas 调透明度用） */
    --p-bg-rgb:238,241,246;     /* 用于拖尾淡覆盖的底色 = --bg */
    --p-ink-rgb:30,41,59;
    --p-brand-rgb:37,99,235;
    --p-warm-rgb:120,90,40;     /* 冷暖对比里的暖色（light 偏暖灰金） */
    --p-cool-rgb:14,165,233;    /* 冷色（青蓝） */
  }
  html[data-theme="dark"]{
    color-scheme: dark;
    --bg:#0b1020; --card:#141b2d; --card-2:#0f1626;
    --ink:#e8edf6; --ink-soft:#c4cee0; --muted:#93a0b8;
    --border:#26304a; --border-strong:#33415f;
    --brand:#6f9bff; --brand-strong:#5b8cff; --brand-weak:rgba(111,155,255,.14); --brand-ring:rgba(111,155,255,.32); --on-brand:#0b1020;
    --success:#34d399; --success-ink:#6ee7b7; --success-bg:rgba(16,185,129,.14); --success-border:rgba(52,211,153,.34);
    --danger:#f87171; --danger-ink:#fca5a5; --danger-bg:rgba(239,68,68,.15); --danger-border:rgba(248,113,113,.36);
    --badge-bg:rgba(99,102,241,.20); --badge-ink:#c7d2fe; --badge-border:rgba(129,140,248,.32);
    --hover:rgba(148,163,184,.12); --glow:rgba(111,155,255,.12);
    --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow-md:0 10px 26px rgba(0,0,0,.5); --shadow-lg:0 24px 60px rgba(0,0,0,.6);
    --p-bg-rgb:11,16,32;        /* = dark --bg，深空底色 */
    --p-ink-rgb:232,237,246;
    --p-brand-rgb:111,155,255;
    --p-warm-rgb:255,214,170;   /* 暖白 / 微金，dark 下点缀几颗暖星 */
    --p-cool-rgb:120,210,255;   /* 冷青蓝 */
  }

  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    color:var(--ink);
    background:radial-gradient(1200px 600px at 50% -10%, var(--glow), transparent 62%), var(--bg);
    background-attachment:fixed; min-height:100vh; margin:0; line-height:1.6;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    transition:background-color .3s ease, color .3s ease;
  }

  /* ---- 全屏固定背景 canvas：永不挡点击 ---- */
  #bg-particles{
    position:fixed; inset:0; width:100%; height:100%;
    pointer-events:none; z-index:0; display:block;
  }

  /* ---- 页面内容统一抬到 canvas 之上 ---- */
  .page{position:relative; z-index:1; max-width:960px; margin:0 auto; padding:18px 16px 80px;}

  /* ---- 顶栏：与站点 .app-header 一致 ---- */
  .app-header{
    display:flex; justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap;
    border:1px solid var(--border); border-radius:var(--radius);
    padding:12px 16px; box-shadow:var(--shadow-sm); margin-bottom:16px;
    /* 顶栏半透明 + 模糊，让穿越光迹隐约透出但不影响可读性 */
    background:color-mix(in srgb, var(--card) 84%, transparent);
    backdrop-filter:saturate(1.08) blur(8px);
    -webkit-backdrop-filter:saturate(1.08) blur(8px);
  }
  .header-left{display:flex; align-items:center; gap:10px; min-width:0}
  .brand-mark{
    width:34px; height:34px; flex:none; border-radius:9px;
    display:inline-flex; align-items:center; justify-content:center;
    background:var(--brand-weak); border:1px solid var(--badge-border); color:var(--brand);
  }
  .brand-mark svg{width:20px; height:20px; display:block}
  h1{font-size:1.25rem; font-weight:750; letter-spacing:-.01em; margin:0}
  .subtitle{font-size:12.5px; color:var(--muted); margin:2px 0 0}
  .controls{display:flex; align-items:center; gap:8px; flex-wrap:wrap}

  .hint{
    font-size:11.5px; color:var(--muted); border:1px dashed var(--border-strong);
    border-radius:var(--pill); padding:5px 11px; white-space:nowrap;
    background:color-mix(in srgb, var(--card) 70%, transparent);
  }

  #theme-toggle{
    width:38px; height:38px; padding:0; border-radius:var(--radius-xs); font-size:17px;
    display:inline-flex; align-items:center; justify-content:center;
    border:1px solid var(--border-strong); background:var(--card); color:var(--ink);
    cursor:pointer; box-shadow:var(--shadow-sm);
    transition:background .15s, border-color .15s, transform .04s;
  }
  #theme-toggle:hover{background:var(--hover)}
  #theme-toggle:active{transform:translateY(1px)}
  #theme-toggle:focus-visible{outline:2px solid var(--brand); outline-offset:2px}

  .toolbar{
    display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin:0 0 16px;
    font-size:13px; color:var(--muted);
  }
  .chip{
    display:inline-flex; align-items:center; gap:6px; font-weight:600; font-size:12.5px;
    background:color-mix(in srgb, var(--card) 88%, transparent); border:1px solid var(--border); color:var(--ink-soft);
    padding:6px 11px; border-radius:var(--pill); box-shadow:var(--shadow-sm);
    backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  }
  .chip b{color:var(--brand)}

  /* ---- 题卡：与站点 .question-card 一致；实心背景保证正文清晰 ---- */
  .question-card{
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px 18px 16px; margin-bottom:16px; box-shadow:var(--shadow-sm);
    transition:border-color .18s, box-shadow .18s;
  }
  .question-card:hover{border-color:var(--border-strong); box-shadow:var(--shadow-md)}
  .question-header{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:6px}
  .q-badge{
    display:inline-flex; align-items:center; font-weight:700; font-size:12.5px;
    background:var(--badge-bg); color:var(--badge-ink); border:1px solid var(--badge-border);
    padding:3px 10px; border-radius:var(--pill);
  }
  .q-tag{font-size:11.5px; color:var(--muted); font-weight:600; letter-spacing:.02em}
  .question-text{font-size:16px; font-weight:650; line-height:1.5; margin:6px 0 12px; color:var(--ink)}

  .choices{list-style:none; padding:0; margin:0}
  .choice-item{margin:8px 0}
  .choice-btn{
    width:100%; text-align:left; background:var(--card); color:var(--ink);
    border:1px solid var(--border-strong); border-radius:var(--radius-sm);
    padding:11px 14px; display:flex; align-items:center; gap:11px; font-size:14.5px;
    line-height:1.45; cursor:pointer;
    transition:background .15s, border-color .15s, box-shadow .15s, transform .04s;
  }
  .choice-btn:hover{background:var(--hover)}
  .choice-btn:active{transform:translateY(1px)}
  .choice-btn:focus-visible{outline:2px solid var(--brand); outline-offset:2px}
  .choice-btn.selected{border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-ring); background:var(--brand-weak)}
  .opt-key{
    flex:none; width:22px; height:22px; border-radius:6px; font-size:12px; font-weight:700;
    display:inline-flex; align-items:center; justify-content:center;
    background:var(--card-2); border:1px solid var(--border-strong); color:var(--ink-soft);
  }
  .choice-btn.selected .opt-key{background:var(--brand); border-color:transparent; color:var(--on-brand)}

  footer.note{text-align:center; color:var(--muted); font-size:12px; margin-top:26px}
</style>
</head>
<body>
  <!-- 全屏粒子背景：内容之下 -->
  <canvas id="bg-particles" aria-hidden="true"></canvas>

  <div class="page">
    <!-- 顶栏 -->
    <header class="app-header">
      <div class="header-left">
        <span class="brand-mark" aria-hidden="true">
          <!-- 简洁机身轮廓图标（呼应航空主题） -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16.5 13.5 13V6.2a1.7 1.7 0 0 0-3.4 0V13L2.6 16.5v1.6L10 16v2.7l-2 1.5v1.1l4-1 4 1v-1.1l-2-1.5V16l7.4 2.1z"/>
          </svg>
        </span>
        <div>
          <h1>AMT Question Bank</h1>
          <p class="subtitle">航空维修执照 · 刷题练习（背景特效预览 · Hyperspace Warp）</p>
        </div>
      </div>
      <div class="controls">
        <span class="hint" aria-hidden="true">移动鼠标偏移消失点 · 点击 warp 加速</span>
        <button id="theme-toggle" type="button" aria-label="切换深色 / 浅色主题" title="切换主题">🌙</button>
      </div>
    </header>

    <!-- 工具条（仿站点统计） -->
    <div class="toolbar">
      <span class="chip">进度 <b>12 / 150</b></span>
      <span class="chip">正确率 <b>92%</b></span>
      <span class="chip">收藏 <b>5</b></span>
      <span class="chip">章节 <b>Powerplant</b></span>
    </div>

    <!-- 题卡容器：脚本注入约 12 张仿题卡 -->
    <main id="cards"></main>

    <footer class="note">背景特效演示 · 纯原生 Canvas · 离线可用 · 点击不被遮挡</footer>
  </div>

<script>
"use strict";
/* ===========================================================================
   仿题卡内容生成（让页面像真站点、足够高可滚动；与特效无关）
   =========================================================================== */
(function buildCards(){
  var data = [
    ["A turbine engine compressor stall is most likely caused by",
      ["Excessive fuel flow at idle","A disrupted, turbulent airflow at the compressor inlet","Low oil pressure in the accessory gearbox","An over-rich mixture during start"]],
    ["The primary purpose of a fire detection thermocouple system is to sense",
      ["Absolute temperature of the zone","A rapid rate of temperature rise","Total accumulated engine hours","Static pressure inside the cowl"]],
    ["Magneto timing on a reciprocating engine is checked relative to",
      ["Top dead center of the compression stroke","Bottom dead center of the exhaust stroke","The carburetor float level","Maximum continuous RPM"]],
    ["In a hydraulic system, an accumulator is installed mainly to",
      ["Increase total fluid volume","Dampen pressure surges and store energy","Filter contaminants from the fluid","Cool the hydraulic pump"]],
    ["Aircraft control cables are commonly fabricated from",
      ["Annealed copper alloy","Corrosion-resistant or carbon steel","Extruded 2024 aluminum","Titanium honeycomb"]],
    ["A static wick on a wingtip is used to",
      ["Measure outside air temperature","Discharge accumulated static electricity","Sense angle of attack","Heat the pitot tube"]],
    ["When torquing a fastener, the value specified is the",
      ["Tension applied directly to the bolt shank","Twisting force applied to the nut or bolt","Shear load the joint can carry","Clamp-up after one full turn"]],
    ["The function of a constant-speed propeller governor is to maintain a selected",
      ["Manifold pressure","Engine RPM by varying blade pitch","Exhaust gas temperature","Fuel-air ratio"]],
    ["Bonding jumpers are installed across structural joints primarily to provide a",
      ["Path for fuel vapor venting","Low-resistance electrical path","Mechanical anti-rotation lock","Drain for trapped moisture"]],
    ["A pneumatic deicing boot removes ice by",
      ["Heating the leading edge electrically","Inflating to crack and shed ice","Spraying glycol over the surface","Vibrating at high frequency"]],
    ["The color used to identify a hydraulic line under ATA standards is typically",
      ["A blue band","A specific stripe / color-coded marking","An orange triangle","A plain unpainted finish"]],
    ["NiCad battery thermal runaway is best described as a condition of",
      ["Gradual self-discharge over weeks","Rising temperature causing rising current, self-reinforcing","Permanent open-circuit failure","Loss of electrolyte by evaporation only"]]
  ];
  var KEYS = ["A","B","C","D"];
  var html = "";
  for(var i=0;i<data.length;i++){
    var q = data[i], n = i+1;
    html += '<article class="question-card">'
      + '<div class="question-header">'
      +   '<span class="q-badge">Question '+n+'</span>'
      +   '<span class="q-tag">单选 · Multiple Choice</span>'
      + '</div>'
      + '<p class="question-text">'+q[0]+'</p>'
      + '<ul class="choices">';
    var opts = q[1];
    for(var j=0;j<opts.length;j++){
      html += '<li class="choice-item"><button class="choice-btn" type="button">'
            + '<span class="opt-key">'+KEYS[j]+'</span><span>'+opts[j]+'</span></button></li>';
    }
    html += '</ul></article>';
  }
  document.getElementById("cards").innerHTML = html;
  // 选项点击的轻交互（仅用于演示「点击不被背景挡住」）
  document.getElementById("cards").addEventListener("click", function(e){
    var btn = e.target.closest(".choice-btn"); if(!btn) return;
    var sibs = btn.closest(".choices").querySelectorAll(".choice-btn");
    for(var k=0;k<sibs.length;k++) sibs[k].classList.remove("selected");
    btn.classList.add("selected");
  });
})();

/* ===========================================================================
   超空间穿越（Hyperspace Warp）粒子背景
   =========================================================================== */
(function hyperspaceBackground(){
  var canvas = document.getElementById("bg-particles");
  if(!canvas || !canvas.getContext) return;
  var ctx = canvas.getContext("2d");
  var docEl = document.documentElement;

  /* ---- 关键参数 CONFIG（详见文件头注释） ---- */
  var CONFIG = {
    STAR_AREA_DIVISOR: 5200,  // 面积 / 此值 = 星数（越小越密）
    STAR_MAX: 460,            // 星数硬上限
    STAR_MIN: 110,            // 星数下限
    BASE_SPEED: 0.62,         // 基础穿越速度（z/秒 的比例）
    BOOST_MULT: 6.2,          // warp boost 峰值倍率（点击瞬时）
    BOOST_DECAY: 2.1,         // boost 每秒衰减（越大回落越快）
    TRAIL_FADE: 0.26,         // 每帧底色淡覆盖透明度（越小拖尾越长）
    TRAIL_FADE_MIN: 0.085,    // boost 高峰时的最低淡覆盖（拖尾拉到最长）
    FOCAL_RATIO: 0.42,        // 透视焦距 = cssH * 此值（分辨率无关；越小景深越夸张）
    PARALLAX: 0.16,           // 消失点跟随鼠标的最大偏移（占半屏比例）
    EASE: 0.06,               // 鼠标偏移 / 速度的缓动系数（越大越跟手）
    SAFE_ZONE: 0.30,          // 中心安全区半径（占 min(宽,高) 比例）：卡片区减光
    Z_NEAR: 0.18,             // 近裁剪（z<此值即回收重生到远处）
    WARM_RATIO: 0.16          // 暖色星比例（冷暖对比的“暖”）
  };

  function reducedMotion(){
    return !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);
  }

  // ---- 视口 / DPR ----
  var dpr = 1, cssW = 0, cssH = 0, cx = 0, cy = 0; // cx/cy = 当前消失点
  var minDim = 1, safeR = 0, focalPx = 320;        // focalPx = cssH * FOCAL_RATIO

  // ---- 主题派生颜色（每次切主题重读 CSS 变量，并预拼颜色 LUT）----
  var col = {
    bgRGB:"11,16,32", inkRGB:"232,237,246",
    brandRGB:"111,155,255", warmRGB:"255,214,170", coolRGB:"120,210,255",
    isDark:true
  };
  function readColors(){
    var cs = getComputedStyle(docEl);
    var get = function(k, dflt){ var v = cs.getPropertyValue(k).trim(); return v || dflt; };
    col.bgRGB    = get("--p-bg-rgb",    col.bgRGB);
    col.inkRGB   = get("--p-ink-rgb",   col.inkRGB);
    col.brandRGB = get("--p-brand-rgb", col.brandRGB);
    col.warmRGB  = get("--p-warm-rgb",  col.warmRGB);
    col.coolRGB  = get("--p-cool-rgb",  col.coolRGB);
    col.isDark   = docEl.getAttribute("data-theme") === "dark";
    buildFadeStyle();
  }

  // 拖尾淡覆盖：用底色（半透明）矩形覆盖上一帧 → 残影曳光
  var fadeStyle = "";
  function buildFadeStyle(){
    // dark 直接用底色覆盖即可；light 背景太亮，additive 光迹在亮底上不明显，
    // 故 light 下淡覆盖稍微压暗一点点（用 ink 微量混入感由 alpha 控制），
    // 这里仍以底色为主，alpha 在 render 时按 boost 动态给。
    fadeStyle = col.bgRGB; // 仅存 RGB，render 时拼 alpha
  }

  // ---- 星粒子：定长并行数组（每帧零分配；回收=就地改值）----
  var N = 0;
  var sx, sy, sz;          // 3D 坐标（x/y 以消失点为原点的“世界”偏移；z 深度）
  var pxn, pyn;            // 上一帧投影屏幕坐标（画拖尾用）
  var sk;                  // kind: 0=brand,1=cool,2=warm（决定颜色）
  var hasPrev;             // 该星是否已有有效的上一帧投影点
  function allocStars(n){
    N = n;
    sx = new Float32Array(n); sy = new Float32Array(n); sz = new Float32Array(n);
    pxn = new Float32Array(n); pyn = new Float32Array(n);
    sk = new Uint8Array(n);   hasPrev = new Uint8Array(n);
  }
  // 世界横向偏移：归一化小量（约 ±SPREAD），由焦距 FOCAL/z 透视放大到屏幕像素。
  // 不能用像素单位（会被 k 放大成几十万 px 飞出屏幕）。SPREAD 取略大于
  // 半屏对焦距之比，保证近处铺满四周、远处汇于消失点。
  var SPREAD = 1.9, ASPECT = 1;
  function spreadX(){ return (Math.random()*2 - 1) * SPREAD * ASPECT; }
  function spreadY(){ return (Math.random()*2 - 1) * SPREAD; }
  // 把第 i 颗星重置到“远处随机位置”
  function respawn(i, freshZ){
    sx[i] = spreadX();
    sy[i] = spreadY();
    sz[i] = freshZ ? (0.6 + Math.random()*0.6) : (CONFIG.Z_NEAR + Math.random()*1.2);
    var r = Math.random();
    sk[i] = (r < CONFIG.WARM_RATIO) ? 2 : (r < CONFIG.WARM_RATIO + 0.34 ? 1 : 0);
    hasPrev[i] = 0;
  }
  function seedStars(){
    for(var i=0;i<N;i++) respawn(i, true);
  }

  function rebuild(){
    var area = cssW * cssH;
    var n = Math.round(area / CONFIG.STAR_AREA_DIVISOR);
    if(n > CONFIG.STAR_MAX) n = CONFIG.STAR_MAX;
    if(n < CONFIG.STAR_MIN) n = CONFIG.STAR_MIN;
    if(Math.min(cssW, cssH) < 560) n = Math.round(n * 0.62); // 窄屏降量
    if(N !== n) allocStars(n);
    seedStars();
  }

  function resize(){
    dpr = Math.min(window.devicePixelRatio || 1, 2);  // DPR 封顶 2
    cssW = window.innerWidth;
    cssH = window.innerHeight;
    canvas.width  = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    canvas.style.width  = cssW + "px";
    canvas.style.height = cssH + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);           // 之后全部用 CSS 像素坐标
    minDim = Math.min(cssW, cssH);
    safeR = minDim * CONFIG.SAFE_ZONE;
    ASPECT = cssW / cssH;                              // 让横向铺满更宽的视口
    focalPx = cssH * CONFIG.FOCAL_RATIO;              // 分辨率无关的焦距
    // 消失点目标默认屏幕中心
    targetCx = cssW * 0.5; targetCy = cssH * 0.5;
    cx = targetCx; cy = targetCy;
    rebuild();
    paintBg();
  }

  // ---- 交互状态：消失点跟手 + warp boost ----
  var targetCx = 0, targetCy = 0;   // 鼠标驱动的消失点目标
  var boost = 0;                     // 当前 boost 叠加量（0 = 无）
  var speedScale = 1;               // 实际速度倍率（缓动逼近 1+boost）
  function onPointerMove(e){
    // 以屏幕中心为基准，按 PARALLAX 比例把消失点推向鼠标反方向的对侧，
    // 形成“视角跟手”的体感（鼠标右移→消失点右移，星流像朝鼠标侧汇聚）
    var px = (e.clientX / cssW) - 0.5;
    var py = (e.clientY / cssH) - 0.5;
    targetCx = cssW * (0.5 + px * CONFIG.PARALLAX * 2);
    targetCy = cssH * (0.5 + py * CONFIG.PARALLAX * 2);
    if(!running && !reducedMotion() && !document.hidden){ // 暂停态也允许跟手一帧
      staticFrame();
    }
  }
  function triggerBoost(){
    boost = CONFIG.BOOST_MULT;           // 瞬时拉满，render 里随时间缓回
    if(!running && !reducedMotion() && !document.hidden) start(); // 万一暂停，点一下也动
  }

  // ---- 底色铺底（首帧 / resize / 切主题用，避免拖尾残留旧色）----
  function paintBg(){
    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = "rgb(" + col.bgRGB + ")";
    ctx.fillRect(0, 0, cssW, cssH);
  }

  /* ---- 渲染一帧 ----
     步骤：1) 半透明底色淡覆盖（拖尾）；2) additive 画星点 + 速度光迹。 */
  function render(dt){
    // 1) 缓动：消失点逼近鼠标目标；速度逼近 1+boost
    cx += (targetCx - cx) * CONFIG.EASE;
    cy += (targetCy - cy) * CONFIG.EASE;
    if(boost > 0){ boost -= CONFIG.BOOST_DECAY * dt; if(boost < 0) boost = 0; }
    var targetScale = 1 + boost;
    speedScale += (targetScale - speedScale) * Math.min(1, CONFIG.EASE * 4);

    // 2) 拖尾淡覆盖：boost 越大、淡覆盖越弱 → 光迹越长
    var fadeA = CONFIG.TRAIL_FADE;
    if(speedScale > 1){
      var t = Math.min(1, (speedScale - 1) / (CONFIG.BOOST_MULT));
      fadeA = CONFIG.TRAIL_FADE + (CONFIG.TRAIL_FADE_MIN - CONFIG.TRAIL_FADE) * t;
    }
    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = "rgba(" + fadeStyle + "," + fadeA.toFixed(3) + ")";
    ctx.fillRect(0, 0, cssW, cssH);

    // 3) 叠加模式按主题切换：
    //    dark → 'lighter' additive 发光（深空里像光迹叠加，最出彩）；
    //    light → 'source-over' 正常混合（亮底上 additive 会顶到纯白、几乎不可见，
    //            改用饱和品牌/冷色直接画出清晰的“蓝图曲速”彩色光迹）。
    ctx.globalCompositeOperation = col.isDark ? "lighter" : "source-over";

    var focal = focalPx;
    var advance = CONFIG.BASE_SPEED * speedScale * dt; // 本帧 z 推进量
    var zNear = CONFIG.Z_NEAR;
    // gain：light 下提高不透明度，让彩色光迹在亮底上够醒目（仍受安全区与景深约束）
    var gain = col.isDark ? 1.0 : 1.45;

    for(var i=0;i<N;i++){
      // 推进：z 减小 = 朝观察者飞来
      var z = sz[i] - advance;
      if(z < zNear){ respawn(i, false); z = sz[i]; }
      else sz[i] = z;

      var k = focal / z;                 // 透视缩放：z 越小越大
      var X = cx + sx[i] * k;            // 投影屏幕坐标（世界偏移已归一化）
      var Y = cy + sy[i] * k;

      // 出屏回收（飞出视口外缘一段就重生，维持密度）
      if(X < -40 || X > cssW + 40 || Y < -40 || Y > cssH + 40){
        respawn(i, false); hasPrev[i] = 0; continue;
      }

      // 亮度 / 尺寸：越近（z 越小、k 越大）越亮越大
      var depth = 1 - (z / 1.8);         // 0(远)~1(近)
      if(depth < 0) depth = 0; else if(depth > 1) depth = 1;

      // 中心安全区：卡片所在中心带，把光迹/亮度衰减，保正文清晰
      var ddx = X - cssW*0.5, ddy = Y - cssH*0.5;
      var distC = Math.sqrt(ddx*ddx + ddy*ddy);
      var safeFade = 1;
      if(distC < safeR){
        safeFade = distC / safeR;        // 圆心 0 → 边缘 1
        safeFade = safeFade * safeFade;  // 平方，使中心更干净
      }

      var prevX = pxn[i], prevY = pyn[i];
      var rgb = (sk[i] === 0) ? col.brandRGB : (sk[i] === 1 ? col.coolRGB : col.warmRGB);

      // —— 速度光迹：上一帧投影点 → 当前点 —— //
      if(hasPrev[i]){
        var trailA = (0.10 + depth*0.55) * safeFade * gain;
        if(trailA > 1) trailA = 1;
        if(trailA > 0.006){
          var lw = (0.4 + depth*1.7);
          ctx.strokeStyle = "rgba(" + rgb + "," + trailA.toFixed(3) + ")";
          ctx.lineWidth = lw;
          ctx.beginPath();
          ctx.moveTo(prevX, prevY);
          ctx.lineTo(X, Y);
          ctx.stroke();
        }
      }

      // —— 星点本体（近处加一圈光晕）—— //
      var headA = (0.18 + depth*0.78) * safeFade * gain;
      if(headA > 1) headA = 1;
      if(headA > 0.006){
        var rad = 0.5 + depth*1.9;
        ctx.fillStyle = "rgba(" + rgb + "," + headA.toFixed(3) + ")";
        ctx.beginPath();
        ctx.arc(X, Y, rad, 0, 6.2832);
        ctx.fill();
        // 很近的星给一圈淡光晕，强化“扑面”体感（数量天然很少，开销可控）。
        // 仅 dark（additive）下做光晕；light 用正常混合时光晕会变成实心盘，故跳过。
        if(col.isDark && depth > 0.78){
          var haloA = (depth - 0.78) * 0.9 * safeFade;
          ctx.fillStyle = "rgba(" + rgb + "," + haloA.toFixed(3) + ")";
          ctx.beginPath();
          ctx.arc(X, Y, rad*2.6, 0, 6.2832);
          ctx.fill();
        }
      }

      // 记录本帧投影点，供下帧画拖尾
      pxn[i] = X; pyn[i] = Y; hasPrev[i] = 1;
    }

    ctx.globalCompositeOperation = "source-over";
  }

  // ---- reduced-motion / 暂停：画一帧静止星点（无穿越运动）----
  function staticFrame(){
    cx += (targetCx - cx) * 1; cy += (targetCy - cy) * 1; // 立即对齐
    paintBg();
    ctx.globalCompositeOperation = col.isDark ? "lighter" : "source-over";
    var focal = focalPx;
    var gain = col.isDark ? 1.0 : 1.35;
    for(var i=0;i<N;i++){
      var z = sz[i];
      var k = focal / z;
      var X = cx + sx[i] * k;
      var Y = cy + sy[i] * k;
      if(X < 0 || X > cssW || Y < 0 || Y > cssH) continue;
      var depth = 1 - (z / 1.8); if(depth < 0) depth = 0; else if(depth > 1) depth = 1;
      var ddx = X - cssW*0.5, ddy = Y - cssH*0.5;
      var distC = Math.sqrt(ddx*ddx + ddy*ddy);
      var safeFade = 1;
      if(distC < safeR){ safeFade = distC / safeR; safeFade *= safeFade; }
      var rgb = (sk[i] === 0) ? col.brandRGB : (sk[i] === 1 ? col.coolRGB : col.warmRGB);
      // 静止态：给一点亮度地板，让它读起来像一片星空而非空屏（仍无运动）
      var a = (0.30 + depth*0.65) * safeFade * gain;
      if(a > 1) a = 1;
      if(a <= 0.006) continue;
      var rad = 0.8 + depth*2.0;
      ctx.fillStyle = "rgba(" + rgb + "," + a.toFixed(3) + ")";
      ctx.beginPath();
      ctx.arc(X, Y, rad, 0, 6.2832);
      ctx.fill();
      // 近星补一圈淡光晕，静止态也有层次（仅 dark additive；light 跳过免实心盘）
      if(col.isDark && depth > 0.7){
        var haloA = (depth - 0.7) * 0.7 * safeFade;
        ctx.fillStyle = "rgba(" + rgb + "," + haloA.toFixed(3) + ")";
        ctx.beginPath();
        ctx.arc(X, Y, rad*2.4, 0, 6.2832);
        ctx.fill();
      }
    }
    ctx.globalCompositeOperation = "source-over";
  }

  // ---- 主循环（单 rAF；每帧零分配）----
  var rafId = 0, lastT = 0, running = false;
  function loop(ts){
    if(!running) return;
    if(!lastT) lastT = ts;
    var dt = (ts - lastT) / 1000;
    lastT = ts;
    if(dt > 0.05) dt = 0.05;   // 切回标签页夹住，避免大跳变
    render(dt);
    rafId = requestAnimationFrame(loop);
  }
  function start(){
    if(running || reducedMotion()) return;
    running = true; lastT = 0;
    rafId = requestAnimationFrame(loop);
  }
  function stop(){
    running = false;
    if(rafId) cancelAnimationFrame(rafId);
    rafId = 0;
  }

  // ---- resize 防抖 ----
  var resizeTimer = 0;
  function onResize(){
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function(){
      resize();
      if(reducedMotion()) staticFrame();
      else if(running){ lastT = 0; }
      else staticFrame();
    }, 150);
  }

  // ---- 可见性：省电 ----
  document.addEventListener("visibilitychange", function(){
    if(document.hidden) stop();
    else if(!reducedMotion()) start();
  });

  // ---- 监听系统 reduced-motion 变化 ----
  if(window.matchMedia){
    var mq = window.matchMedia("(prefers-reduced-motion: reduce)");
    var onMq = function(){ if(mq.matches){ stop(); paintBg(); staticFrame(); } else start(); };
    if(mq.addEventListener) mq.addEventListener("change", onMq);
    else if(mq.addListener) mq.addListener(onMq);
  }

  // ---- 交互监听（在 window 上：canvas 是 pointer-events:none 也能跟手）----
  window.addEventListener("resize", onResize);
  window.addEventListener("pointermove", onPointerMove, {passive:true});
  window.addEventListener("pointerdown", triggerBoost, {passive:true});

  // ---- 初始化 ----
  function init(){
    readColors();
    resize();
    if(reducedMotion()) staticFrame();
    else start();
  }
  init();

  // ---- 暴露给主题切换：重读颜色 + 重铺底色（清掉旧色拖尾）+ 视情况补帧 ----
  window.__hyperspaceOnThemeChange = function(){
    readColors();
    paintBg();
    if(reducedMotion() || document.hidden) staticFrame();
    else { lastT = 0; } // 运行中：下一帧自动用新颜色（底已重铺，无残留旧色）
  };
})();

/* ===========================================================================
   主题切换按钮（与站点一致：写 data-theme + localStorage，并通知特效换色）
   =========================================================================== */
(function themeToggle(){
  var btn = document.getElementById("theme-toggle");
  var docEl = document.documentElement;
  function sync(){
    var dark = docEl.getAttribute("data-theme") === "dark";
    btn.textContent = dark ? "☀️" : "🌙";
    btn.setAttribute("aria-label", dark ? "切换到浅色主题" : "切换到深色主题");
  }
  sync();
  btn.addEventListener("click", function(){
    var next = docEl.getAttribute("data-theme") === "dark" ? "light" : "dark";
    docEl.setAttribute("data-theme", next);
    try{ localStorage.setItem("qb_theme", next); }catch(e){}
    sync();
    if(typeof window.__hyperspaceOnThemeChange === "function") window.__hyperspaceOnThemeChange();
  });
})();
</script>
</body>
