<!DOCTYPE html>
<html lang="zh" data-theme="light">
<!--
  ============================================================================
  名称       : A — Constellation / Navigation Network（星座 / 导航网络）
  用途       : AMT Question Bank 刷题站的粒子背景特效候选方案 A
  美学方向   : 航海 / 航空导航星图。漂浮的节点（星），彼此足够近时用细线相连，
              线透明度随距离平方衰减；整体克制、稀疏、有呼吸感，品牌蓝调，
              低透明度，淡雅不刺眼——是学习站的氛围背景，不是游戏。
              鼠标极克制交互：光标半径内的节点被温和吸引，并增强其连线。

  ---------------------------------------------------------------------------
  粒子数自适应逻辑
    count = clamp( floor(viewportArea / AREA_PER_NODE), MIN, capByWidth )
    - AREA_PER_NODE ≈ 16000 px²/节点（约每 126×126 区域放 1 个，保持稀疏）
    - 桌面封顶 ~120，平板 ~80，手机 ~46（按视口宽度分档）
    - MIN = 14，避免极小窗口时空荡
    连线只在邻近节点间生成（O(n²) 距离判断，n≤120 完全可接受）。

  ---------------------------------------------------------------------------
  性能要点
    - 纯原生 Canvas 2D + 单条 requestAnimationFrame 循环。
    - 无外部库 / CDN / import / <script src>，完全离线自包含。
    - canvas 按 devicePixelRatio 缩放（缩放上限 2，省得 4K 屏过载）。
    - 每帧零分配：所有节点预分配进定长 typed-like 数组（普通对象数组复用，
      不在 rAF 内 new / push / 创建闭包）。
    - resize 防抖（150ms）后重建尺寸与节点数。
    - document.hidden / visibilitychange：隐藏即 cancelAnimationFrame 停转，
      回到前台再续，彻底省电。
    - prefers-reduced-motion: reduce → 不进入动画循环，只画一帧静态稀疏点。
    - canvas: position:fixed; inset:0; pointer-events:none; z-index:0，
      绝不拦截点击；页面内容在 z-index:1。
  ============================================================================
-->
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AMT Question Bank — Constellation 背景</title>
<style>
  :root{
    /* 浅色主题（与真实站点完全一致的 design tokens） */
    --bg:#eef1f6; --card:#ffffff; --card-2:#f6f8fc;
    --ink:#1e293b; --ink-soft:#3b4860; --muted:#64748b;
    --border:#e4e8f0; --border-strong:#d3d9e4;
    --brand:#2563eb; --brand-strong:#1d4ed8; --brand-weak:#eef4ff;
    --brand-ring:rgba(37,99,235,.18); --on-brand:#ffffff;
    --badge-bg:#eef2ff; --badge-ink:#3730a3; --badge-border:#e0e7ff;
    --hover:#f1f5f9; --glow:rgba(37,99,235,.06);
    --shadow-sm:0 1px 2px rgba(16,24,40,.06);
    --shadow-md:0 8px 22px rgba(16,24,40,.08);
    --radius:14px; --radius-sm:10px; --radius-xs:8px; --pill:999px;
    /* 粒子色（RGB 分量，便于在 JS 里拼 rgba） */
    --particle-rgb:37,99,235;
  }
  html[data-theme="dark"]{
    --bg:#0b1020; --card:#141b2d; --card-2:#0f1626;
    --ink:#e8edf6; --ink-soft:#c4cee0; --muted:#93a0b8;
    --border:#26304a; --border-strong:#33415f;
    --brand:#6f9bff; --brand-strong:#5b8cff; --brand-weak:rgba(111,155,255,.14);
    --brand-ring:rgba(111,155,255,.32); --on-brand:#0b1020;
    --badge-bg:rgba(99,102,241,.20); --badge-ink:#c7d2fe; --badge-border:rgba(129,140,248,.32);
    --hover:rgba(148,163,184,.12); --glow:rgba(111,155,255,.12);
    --shadow-sm:0 1px 2px rgba(0,0,0,.4);
    --shadow-md:0 10px 26px rgba(0,0,0,.5);
    --particle-rgb:111,155,255;
  }

  *{box-sizing:border-box}
  html,body{margin:0; padding:0}
  body{
    min-height:100%;
    color:var(--ink);
    background:radial-gradient(1100px 560px at 100% -12%, var(--glow), transparent 60%), var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    transition:background-color .3s ease;
  }

  /* ---- 粒子 canvas：固定全屏背景，不拦截点击 ---- */
  #constellation{
    position:fixed; inset:0;
    width:100%; height:100%;
    pointer-events:none;
    z-index:0;
    display:block;
  }

  /* ---- 真实内容垫底（z-index:1 之上）---- */
  .page{position:relative; z-index:1}

  /* 顶栏 */
  .topbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; gap:14px;
    padding:12px 20px;
    background:color-mix(in srgb, var(--bg) 78%, transparent);
    backdrop-filter:saturate(140%) blur(10px);
    -webkit-backdrop-filter:saturate(140%) blur(10px);
    border-bottom:1px solid var(--border);
  }
  .brand-mark{
    width:30px; height:30px; flex:none;
    border-radius:9px;
    background:linear-gradient(135deg, var(--brand), var(--brand-strong));
    box-shadow:var(--shadow-sm);
    display:grid; place-items:center;
    color:var(--on-brand); font-size:15px; font-weight:800;
  }
  .topbar h1{
    font-size:17px; font-weight:750; margin:0;
    letter-spacing:.2px; color:var(--ink);
    white-space:nowrap;
  }
  .topbar .spacer{flex:1}
  .pill-tag{
    font-size:12px; font-weight:650; color:var(--muted);
    border:1px solid var(--border); background:var(--card);
    padding:4px 11px; border-radius:var(--pill);
    box-shadow:var(--shadow-sm);
  }
  #theme-toggle{
    width:38px; height:38px; padding:0; flex:none;
    border-radius:var(--radius-xs); font-size:17px;
    display:inline-flex; align-items:center; justify-content:center;
    border:1px solid var(--border-strong); background:var(--card);
    color:var(--ink); cursor:pointer; box-shadow:var(--shadow-sm);
    transition:background .15s, transform .08s, border-color .15s;
  }
  #theme-toggle:hover{background:var(--hover); border-color:var(--brand)}
  #theme-toggle:active{transform:scale(.94)}
  #theme-toggle:focus-visible{outline:2px solid var(--brand); outline-offset:2px}

  /* 容器 */
  .wrap{max-width:960px; margin:0 auto; padding:26px 16px 80px}

  .lead{margin:6px 2px 22px}
  .lead h2{font-size:24px; font-weight:760; margin:0 0 6px; color:var(--ink)}
  .lead p{margin:0; color:var(--muted); font-size:14.5px; max-width:60ch}

  /* 进度条（仿题站 sticky 进度，让背景与真实 UI 共存） */
  .progress{
    display:flex; align-items:center; gap:12px;
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:12px 16px;
    box-shadow:var(--shadow-sm); margin-bottom:20px;
  }
  .progress .bar{flex:1; height:8px; border-radius:var(--pill); background:var(--card-2); border:1px solid var(--border); overflow:hidden}
  .progress .fill{height:100%; width:38%; background:var(--brand); border-radius:var(--pill)}
  .progress .num{font-size:13px; font-weight:700; color:var(--ink-soft); white-space:nowrap}

  /* 题卡 */
  .question-card{
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:18px 18px 16px;
    margin-bottom:16px; box-shadow:var(--shadow-sm);
    transition:border-color .18s, box-shadow .18s, transform .12s;
  }
  .question-card:hover{border-color:var(--border-strong); box-shadow:var(--shadow-md); transform:translateY(-1px)}
  .q-head{display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap}
  .q-badge{
    display:inline-flex; align-items:center; font-weight:700; font-size:12.5px;
    background:var(--badge-bg); color:var(--badge-ink); border:1px solid var(--badge-border);
    padding:3px 10px; border-radius:var(--pill);
  }
  .q-tag{font-size:11.5px; font-weight:600; color:var(--muted); border:1px solid var(--border); padding:2px 8px; border-radius:var(--pill)}
  .question-text{font-size:16px; font-weight:650; line-height:1.5; margin:2px 0 12px; color:var(--ink)}
  .choices{display:flex; flex-direction:column; gap:9px}
  .choice{
    display:flex; align-items:flex-start; gap:11px;
    background:var(--card); color:var(--ink);
    border:1px solid var(--border-strong); border-radius:var(--radius-sm);
    padding:11px 14px; font-size:14.5px; line-height:1.45; cursor:pointer;
    transition:background .15s, border-color .15s, box-shadow .15s, transform .04s;
  }
  .choice:hover{background:var(--hover); border-color:var(--brand)}
  .choice:active{transform:scale(.997)}
  .choice .key{
    flex:none; width:22px; height:22px; border-radius:6px;
    display:grid; place-items:center; font-size:12px; font-weight:700;
    background:var(--card-2); border:1px solid var(--border-strong); color:var(--ink-soft);
  }
  .choice.is-correct{border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-ring); background:var(--brand-weak)}
  .choice.is-correct .key{background:var(--brand); color:var(--on-brand); border-color:transparent}

  footer{margin-top:8px; text-align:center; color:var(--muted); font-size:13px}

  /* reduced-motion：关掉所有过渡，背景静止 */
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important}
  }
</style>
</head>
<body>
  <!-- 粒子背景层 -->
  <canvas id="constellation" aria-hidden="true"></canvas>

  <!-- 真实内容 -->
  <div class="page">
    <header class="topbar">
      <span class="brand-mark">A</span>
      <h1>AMT Question Bank</h1>
      <span class="pill-tag">Constellation 背景 · 候选 A</span>

<script>
/* ====== 真实内容：生成 ~12 张仿题卡（不影响特效，仅垫底用） ====== */

<script>
/* =====================================================================
   星座 / 导航网络 粒子背景
   独立 IIFE；不污染全局；每帧零分配；省电；尊重 reduced-motion。
   ===================================================================== */
(function constellation(){
  "use strict";

  var canvas = document.getElementById('constellation');
  var ctx = canvas.getContext('2d', { alpha: true });
  if(!ctx) return;

  /* ---------- 可调参数 ---------- */
  var AREA_PER_NODE = 16000;   // 每个节点占用的视口面积 px²（越大越稀疏）
  var MIN_NODES     = 14;
  var LINK_DIST     = 132;     // 连线距离阈值（CSS px）；超过此距离不连
  var LINK_DIST_SQ  = LINK_DIST * LINK_DIST;
  var MOUSE_RADIUS  = 150;     // 鼠标影响半径
  var MOUSE_RADIUS_SQ = MOUSE_RADIUS * MOUSE_RADIUS;
  var MOUSE_PULL    = 0.022;   // 鼠标吸引强度（极克制）
  var MAX_DPR       = 2;       // dpr 上限，4K 屏省电
  var SPEED         = 0.16;    // 基础漂移速度（CSS px / 帧 @60fps）

  /* ---------- 状态 ---------- */
  var dpr = 1;
  var W = 0, H = 0;            // CSS 像素尺寸
  var nodeCount = 0;
  var nodes = [];             // 预分配的节点对象数组（复用，不在 rAF 内 new）
  var rafId = 0;
  var running = false;
  var reduceMotion = false;

  // 颜色（从 CSS 变量读出的 "r,g,b" 分量），随主题更新
  var rgb = "37,99,235";

  // 鼠标（fixed 视口坐标）；active=false 时不施加吸引
  var mouseX = 0, mouseY = 0, mouseActive = false;

  var reduceMQ = window.matchMedia ? window.matchMedia('(prefers-reduced-motion: reduce)') : null;

  /* ---------- 工具 ---------- */
  function clamp(v, lo, hi){ return v < lo ? lo : (v > hi ? hi : v); }

  function readParticleColor(){
    var c = getComputedStyle(document.documentElement)
              .getPropertyValue('--particle-rgb').trim();
    if(c) rgb = c;
  }

  // 按视口宽度给封顶分档：手机 < 平板 < 桌面
  function nodeCap(){
    if(W < 560)  return 46;
    if(W < 1000) return 80;
    return 120;
  }

  function computeNodeCount(){
    var area = W * H;
    var byArea = Math.floor(area / AREA_PER_NODE);
    return clamp(byArea, MIN_NODES, nodeCap());
  }

  /* ---------- 尺寸 / 节点池 ---------- */
  function resize(){
    dpr = clamp(window.devicePixelRatio || 1, 1, MAX_DPR);
    W = window.innerWidth;
    H = window.innerHeight;

    canvas.width  = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    // 用 dpr 缩放，绘制时仍按 CSS px 思考
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    rebuildNodes();
  }

  // 预分配 / 复用节点对象，避免运行期分配
  function rebuildNodes(){
    var target = computeNodeCount();
    // 扩容（仅在需要时分配新对象）
    while(nodes.length < target){
      nodes.push({ x:0, y:0, vx:0, vy:0, r:0, tw:0, tws:0 });
    }
    // 缩容（保留数组容量，仅调整使用长度）
    nodeCount = target;

    for(var i=0;i<nodeCount;i++){
      var n = nodes[i];
      n.x  = Math.random() * W;
      n.y  = Math.random() * H;
      var ang = Math.random() * Math.PI * 2;
      n.vx = Math.cos(ang) * SPEED * (0.5 + Math.random());
      n.vy = Math.sin(ang) * SPEED * (0.5 + Math.random());
      n.r  = 1.1 + Math.random() * 1.6;      // 半径
      n.tw = Math.random() * Math.PI * 2;    // 闪烁相位
      n.tws = 0.008 + Math.random() * 0.012; // 闪烁速度
    }
  }

  /* ---------- 绘制 ---------- */

  // 一帧静态稀疏点（reduced-motion 或首帧）
  function drawStatic(){
    ctx.clearRect(0, 0, W, H);
    // 静态模式下连线 + 节点都画一次，给个克制的成像
    drawLinks(0.55);
    for(var i=0;i<nodeCount;i++){
      var n = nodes[i];
      drawNode(n, 0.5);
    }
  }

  function drawNode(n, alphaScale){
    var a = (0.45 + 0.3 * Math.sin(n.tw)) * alphaScale; // 轻微呼吸闪烁
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + rgb + ',' + a.toFixed(3) + ')';
    ctx.fill();
  }

  // 邻近节点连线；mouseBoost: 鼠标半径内的连线略增强
  function drawLinks(globalScale){
    ctx.lineWidth = 1;
    for(var i=0;i<nodeCount;i++){
      var a = nodes[i];
      for(var j=i+1;j<nodeCount;j++){
        var b = nodes[j];
        var dx = a.x - b.x;
        var dy = a.y - b.y;
        var d2 = dx*dx + dy*dy;
        if(d2 < LINK_DIST_SQ){
          // 距离衰减：近 → 不透明，远 → 趋 0（用平方比例，衰减更克制）
          var t = 1 - d2 / LINK_DIST_SQ;          // 0..1
          var alpha = t * t * 0.22 * globalScale;  // 上限很低，淡雅

          // 鼠标增强：若任一端在鼠标半径内，连线稍亮
          if(mouseActive){
            var mdx = a.x - mouseX, mdy = a.y - mouseY;
            if(mdx*mdx + mdy*mdy < MOUSE_RADIUS_SQ) alpha += 0.10 * t;
          }

          if(alpha <= 0.004) continue;
          ctx.strokeStyle = 'rgba(' + rgb + ',' + alpha.toFixed(3) + ')';
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }
  }

  /* ---------- 主循环（每帧零分配） ---------- */
  function step(){
    ctx.clearRect(0, 0, W, H);

    var i, n;
    // 更新位置
    for(i=0;i<nodeCount;i++){
      n = nodes[i];
      n.x += n.vx;
      n.y += n.vy;
      n.tw += n.tws;

      // 边界回弹（留一点边距，避免贴边卡住）
      if(n.x < -20){ n.x = -20; n.vx = -n.vx; }
      else if(n.x > W + 20){ n.x = W + 20; n.vx = -n.vx; }
      if(n.y < -20){ n.y = -20; n.vy = -n.vy; }
      else if(n.y > H + 20){ n.y = H + 20; n.vy = -n.vy; }

      // 鼠标温和吸引（极克制；只在半径内，且力随距离线性减弱）
      if(mouseActive){
        var dx = mouseX - n.x;
        var dy = mouseY - n.y;
        var d2 = dx*dx + dy*dy;
        if(d2 < MOUSE_RADIUS_SQ && d2 > 1){
          var f = (1 - d2 / MOUSE_RADIUS_SQ) * MOUSE_PULL;
          var inv = 1 / Math.sqrt(d2);
          n.vx += dx * inv * f;
          n.vy += dy * inv * f;
        }
      }

      // 速度阻尼，避免被鼠标越加越快
      n.vx *= 0.992; n.vy *= 0.992;
      // 维持最低漂移速度，避免全部静止
      var sp2 = n.vx*n.vx + n.vy*n.vy;
      if(sp2 < 0.0025){
        var k = 0.05 / (Math.sqrt(sp2) + 0.0001);
        n.vx += n.vx * k; n.vy += n.vy * k;
      }
    }

    // 先连线（在节点下层），再画节点
    drawLinks(1);
    for(i=0;i<nodeCount;i++){
      drawNode(nodes[i], 1);
    }

    rafId = requestAnimationFrame(step);
  }

  /* ---------- 生命周期控制 ---------- */
  function start(){
    if(running) return;
    if(reduceMotion){ drawStatic(); return; } // 静态一帧，不进循环
    running = true;
    rafId = requestAnimationFrame(step);
  }
  function stop(){
    running = false;
    if(rafId){ cancelAnimationFrame(rafId); rafId = 0; }
  }

  function onVisibility(){
    if(document.hidden){ stop(); }
    else if(!reduceMotion){ start(); }
    else { drawStatic(); }
  }

  // resize 防抖
  var resizeTimer = 0;
  function onResize(){
    if(resizeTimer) clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function(){
      resizeTimer = 0;
      resize();
      if(reduceMotion || document.hidden){ drawStatic(); }
      // 运行中无需重启：循环里用的是最新 W/H 与节点
    }, 150);
  }

  /* ---------- 鼠标交互（背景 pointer-events:none，监听挂 window） ---------- */
  function onPointerMove(e){
    mouseX = e.clientX;
    mouseY = e.clientY;
    mouseActive = true;
  }
  function onPointerLeave(){ mouseActive = false; }

  /* ---------- 主题切换：更新粒子色并重绘静态帧 ---------- */
  function applyThemeVisuals(){
    readParticleColor();
    if(reduceMotion || document.hidden) drawStatic();
    // 动画中下一帧自然用到新 rgb
  }

  /* ---------- reduced-motion 变化（系统设置切换时即时响应） ---------- */
  function onReduceChange(){
    reduceMotion = !!(reduceMQ && reduceMQ.matches);
    stop();
    if(reduceMotion){ drawStatic(); }
    else if(!document.hidden){ start(); }
  }

  /* ---------- 初始化 ---------- */
  function init(){
    reduceMotion = !!(reduceMQ && reduceMQ.matches);
    readParticleColor();
    resize();          // 设定尺寸 + 建节点
    start();           // 动画或静态一帧

    window.addEventListener('resize', onResize, { passive:true });
    document.addEventListener('visibilitychange', onVisibility);
    window.addEventListener('pointermove', onPointerMove, { passive:true });
    window.addEventListener('blur', onPointerLeave);
    document.addEventListener('mouseleave', onPointerLeave);

    // reduced-motion 监听（兼容老 API）
    if(reduceMQ){
      if(reduceMQ.addEventListener) reduceMQ.addEventListener('change', onReduceChange);
      else if(reduceMQ.addListener) reduceMQ.addListener(onReduceChange);
    }

    // 暴露给主题切换按钮调用
    window.__constellationThemeUpdate = applyThemeVisuals;
  }

  // DOM 就绪后启动
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

<script>
/* ====== 主题切换按钮：切 data-theme，并通知粒子层更新颜色 ====== */
(function themeToggle(){
  var KEY = 'qb_theme_demo';
  var root = document.documentElement;
  var btn = document.getElementById('theme-toggle');

  // 初始：localStorage > 系统偏好
  try{
    var saved = localStorage.getItem(KEY);
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    var theme = (saved === 'dark' || saved === 'light') ? saved : (prefersDark ? 'dark' : 'light');
    root.setAttribute('data-theme', theme);
  }catch(e){}

  function syncIcon(){
    var dark = root.getAttribute('data-theme') === 'dark';
    btn.textContent = dark ? '☀️' : '🌙';
    btn.setAttribute('aria-label', dark ? '切换到浅色主题' : '切换到深色主题');
  }
  syncIcon();

  btn.addEventListener('click', function(){
    var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try{ localStorage.setItem(KEY, next); }catch(e){}
    syncIcon();
    // 通知粒子层：CSS 变量已变，更新粒子色
    if(window.__constellationThemeUpdate) window.__constellationThemeUpdate();
  });
})();
</script>
