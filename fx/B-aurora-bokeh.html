<!doctype html>
<!--
  ============================================================================
  名称        : B — Aurora Bokeh（极光柔光 / 焦外光斑）
  美学        : 几团大而柔的模糊光斑（品牌蓝 + 点缀青/紫），缓慢漂移、呼吸式
                明暗、带层次景深（远的更模糊更慢、近的略清晰）。像高端 SaaS
                落地页那种安静、温暖、有呼吸感的氛围光，绝不喧宾夺主。
  实现手法    : 纯原生 Canvas 2D。柔光不用逐像素 blur，而是用「低分辨率离屏
                canvas 画一堆 radial-gradient 光斑 → 用 ctx.filter 轻微模糊 →
                drawImage 放大铺满全屏」。离屏只有约 1/8 分辨率，放大本身就是
                天然的廉价柔焦，配合极小的 blur 即可得到丝滑的焦外效果。
  性能要点    :
                - 离屏画布 ≈ 视口的 1/8（DOWNSCALE=8），像素量只有全屏的 1/64。
                - 光斑数量固定 9 个（含一颗鼠标视差跟随的近景斑）。
                - 每帧零分配：所有 blob/缓冲在初始化时建好，循环里只改数值。
                - radial gradient 每帧重建（必要，因为半径/透明度在变），但只在
                  小离屏上画，成本可忽略。
                - document.hidden → 暂停 rAF；visibilitychange → 恢复。
                - prefers-reduced-motion: reduce → 只画一帧静态柔光，不起循环。
                - resize 防抖 150ms；devicePixelRatio 处理（离屏与 DPR 解耦，
                  柔光不需要 retina 精度，所以离屏始终低分辨率，CSS 拉伸即可）。
  自包含      : 仅内联 <style> + 内联 <script>，无任何外部库 / CDN / import。
  ============================================================================
-->
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8" />
<title>Aurora Bokeh — AMT Question Bank</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="color-scheme" content="light dark" />
<script>
  // 早期主题应用，避免首屏闪烁（与站点 qb_theme 约定一致）
  (function () {
    try {
      var k = "qb_theme",
        s = localStorage.getItem(k),
        m = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches,
        t = (s === "dark" || s === "light") ? s : (m ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  })();
</script>
<style>

    color-scheme: light;
    --bg: #eef1f6;
    --card: #ffffff;
    --card-2: #f6f8fc;
    --ink: #1e293b;
    --ink-soft: #3b4860;
    --muted: #64748b;
    --border: #e4e8f0;
    --border-strong: #d3d9e4;
    --brand: #2563eb;
    --brand-strong: #1d4ed8;
    --badge-bg: #eef2ff;
    --badge-ink: #3730a3;
    --badge-border: #e0e7ff;
    --hover: #f1f5f9;
    --shadow-sm: 0 1px 2px rgba(16, 24, 40, .06);
    --shadow-md: 0 8px 22px rgba(16, 24, 40, .08);
    --radius: 14px;
    --radius-xs: 8px;
    --pill: 999px;
  }
  html[data-theme="dark"] {
    color-scheme: dark;
    --bg: #0b1020;
    --card: #141b2d;
    --card-2: #0f1626;
    --ink: #e8edf6;
    --ink-soft: #c4cee0;
    --muted: #93a0b8;
    --border: #26304a;
    --border-strong: #33415f;
    --brand: #6f9bff;
    --brand-strong: #5b8cff;
    --badge-bg: rgba(99, 102, 241, .20);
    --badge-ink: #c7d2fe;
    --badge-border: rgba(129, 140, 248, .32);
    --hover: rgba(148, 163, 184, .12);
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, .4);
    --shadow-md: 0 10px 26px rgba(0, 0, 0, .5);
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;

  /* ---- 全屏固定柔光背景 canvas ---- */

  /* ---- 页面内容统一在 canvas 之上 ---- */

    z-index: 1;

  .choice-btn:hover { background: var(--hover); border-color: var(--brand); }

<body>
  <!-- 柔光背景 -->
  <canvas id="fx" aria-hidden="true"></canvas>

  <!-- 仿真站点内容 -->
  <div class="page">
    <header class="app-header">
      <div class="header-left">
        <span class="logo-dot" aria-hidden="true"></span>
        <h1>AMT Question Bank</h1>
      </div>
      <div class="controls">
        <button id="theme-toggle" type="button" aria-label="切换深色 / 浅色主题" title="切换主题">🌙</button>
      </div>
    </header>

    <p class="intro">极光柔光（Aurora Bokeh）背景候选演示 — 几团缓慢呼吸的焦外光斑垫在题卡之下，淡雅、有景深、不干扰阅读。点右上角按钮切换主题。</p>

    <main id="cards"></main>

    <footer>粒子背景设计候选 · Aurora Bokeh · 纯原生 Canvas 2D · 离线自包含</footer>
  </div>

  <script>
  (function () {
    "use strict";

    /* ===================== 仿真题卡（垫底真实内容） ===================== */
    (function buildCards() {
      var stems = [
        "Excessive valve clearance in a reciprocating engine will result in which condition?",
        "What is the primary purpose of a fusible plug installed in a tubeless aircraft tire wheel?",
        "Which material is commonly used as the core of a sandwich (honeycomb) structure?",
        "When torquing a bolt, the use of an extension on the torque wrench requires the indicated torque to be ___.",
        "The color of the gas inside a fluorescent strobe-light tube is determined by which factor?",
        "What unit is used to express the electrical resistance of a conductor?",
        "Aircraft magnetos are timed to the engine to fire the spark plugs ___ top dead center.",
        "Which type of corrosion is characterized by a rough, grainy surface and tiny pits?",
        "A pitot-static system blockage at the pitot tube primarily affects which instrument?",
        "What is the function of a check valve in an aircraft hydraulic system?",
        "Aircraft control cables made of corrosion-resistant steel are typically used in which environment?",
        "Which document records the total time in service of an aircraft and its components?"
      ];
      var tags = ["Powerplant", "Airframe", "Materials", "General", "Electrical", "Electrical",
                  "Powerplant", "Materials", "Instruments", "Hydraulics", "Airframe", "Regulations"];
      var opts = [
        ["Lower than normal volumetric efficiency.", "Late valve opening and early closing.", "Increased engine power output."],
        ["Release tire pressure if the wheel overheats.", "Indicate when the tire needs replacement.", "Balance the wheel assembly."],
        ["Aluminum or aramid (Nomex) honeycomb.", "Solid forged titanium.", "Laminated hardwood plies."],
        ["Recalculated using the wrench formula.", "Left unchanged from the chart value.", "Doubled for safety."],
        ["The gas used to fill the tube.", "The voltage applied across it.", "The thickness of the glass."],
        ["The ohm.", "The ampere.", "The watt."],
        ["a few degrees before.", "exactly at.", "well after."],
        ["Intergranular corrosion.", "Surface (pitting) corrosion.", "Stress corrosion cracking."],
        ["The airspeed indicator.", "The vertical speed indicator only.", "The magnetic compass."],
        ["Allow fluid flow in one direction only.", "Regulate system pressure to a set value.", "Filter contaminants from the fluid."],
        ["High-moisture / marine environments.", "Only inside pressurized cabins.", "Dry desert hangars exclusively."],
        ["The aircraft maintenance records / logbook.", "The pilot's personal flight log.", "The fuel receipt ledger."]
      ];
      var keys = ["A", "B", "C"];
      var frag = document.createDocumentFragment();
      for (var i = 0; i < stems.length; i++) {
        var card = document.createElement("article");
        card.className = "question-card";

        var head = document.createElement("div");
        head.className = "question-header";
        var badge = document.createElement("span");
        badge.className = "q-badge";
        badge.textContent = "Question " + (i + 1);
        var tag = document.createElement("span");
        tag.className = "q-tag";
        tag.textContent = tags[i];
        head.appendChild(badge);
        head.appendChild(tag);

        var q = document.createElement("p");
        q.className = "question-text";
        q.textContent = stems[i];

        var ul = document.createElement("ul");
        ul.className = "choices";
        for (var j = 0; j < 3; j++) {
          var li = document.createElement("li");
          li.className = "choice-item";
          var btn = document.createElement("button");
          btn.className = "choice-btn";
          btn.type = "button";
          var k = document.createElement("span");
          k.className = "choice-key";
          k.textContent = keys[j];
          var txt = document.createElement("span");
          txt.textContent = opts[i][j];
          btn.appendChild(k);
          btn.appendChild(txt);
          li.appendChild(btn);
          ul.appendChild(li);
        }

        card.appendChild(head);
        card.appendChild(q);
        card.appendChild(ul);
        frag.appendChild(card);
      }
      document.getElementById("cards").appendChild(frag);
    })();

    /* ===================== Aurora Bokeh 柔光引擎 ===================== */

    var canvas = document.getElementById("fx");
    var ctx = canvas.getContext("2d", { alpha: true });

    // 离屏低分辨率画布：柔光的真正画布
    var off = document.createElement("canvas");
    var octx = off.getContext("2d", { alpha: true });

    var DOWNSCALE = 8;          // 离屏 = 视口 / 8（像素量约 1/64）
    var MIN_OFF = 80;           // 离屏边长下限，避免极小窗口下退化
    var reduceMotion = window.matchMedia
      ? window.matchMedia("(prefers-reduced-motion: reduce)")
      : { matches: false, addEventListener: function () {}, addListener: function () {} };

    var W = 0, H = 0;           // CSS 像素视口尺寸
    var OW = 0, OH = 0;         // 离屏尺寸
    var rafId = 0;
    var running = false;
    var startTime = 0;

    // 鼠标视差（仅近景斑明显跟随）
    var mouse = { x: 0.5, y: 0.5, tx: 0.5, ty: 0.5 };

    // 调色板：随主题取色。每个色给出 rgb 三元组。
    var PALETTES = {
      light: {
        clear: null,                       // 不铺底色（透明，露出 body 背景）
        blobs: [
          [37, 99, 235],                   // 品牌蓝
          [56, 130, 246],                  // 亮蓝
          [99, 102, 241],                  // 靛/紫
          [45, 170, 200],                  // 青
          [37, 99, 235]
        ],
        alphaScale: 0.16                    // 浅色：极低透明度，保持淡雅
      },
      dark: {
        clear: null,
        blobs: [
          [111, 155, 255],                 // 品牌蓝（dark）
          [91, 140, 255],                  // 蓝
          [129, 140, 248],                 // 紫
          [56, 189, 220],                  // 青
          [111, 155, 255]
        ],
        alphaScale: 0.30                    // 深色：可以亮一点点，仍不刺眼
      }
    };

    // 光斑定义：depth ∈ (0,1]，越小=越远=越模糊越慢越大。
    // 位置/相位用归一化坐标，resize 不需重建。
    var BLOBS = [
      { baseX: 0.18, baseY: 0.22, r: 0.55, depth: 0.30, ci: 0, sp: 0.055, ph: 0.0, drift: 0.10, par: 0.20 },
      { baseX: 0.82, baseY: 0.30, r: 0.50, depth: 0.40, ci: 1, sp: 0.045, ph: 1.7, drift: 0.12, par: 0.30 },
      { baseX: 0.65, baseY: 0.72, r: 0.62, depth: 0.25, ci: 2, sp: 0.038, ph: 3.1, drift: 0.09, par: 0.18 },
      { baseX: 0.30, baseY: 0.80, r: 0.42, depth: 0.55, ci: 3, sp: 0.060, ph: 4.4, drift: 0.13, par: 0.45 },
      { baseX: 0.50, baseY: 0.45, r: 0.70, depth: 0.18, ci: 4, sp: 0.030, ph: 2.2, drift: 0.07, par: 0.10 },
      { baseX: 0.10, baseY: 0.60, r: 0.36, depth: 0.62, ci: 1, sp: 0.066, ph: 5.5, drift: 0.14, par: 0.50 },
      { baseX: 0.90, baseY: 0.78, r: 0.40, depth: 0.50, ci: 3, sp: 0.052, ph: 0.9, drift: 0.11, par: 0.40 },
      { baseX: 0.40, baseY: 0.12, r: 0.34, depth: 0.66, ci: 2, sp: 0.070, ph: 3.8, drift: 0.12, par: 0.55 },
      // 近景斑：最清晰、最跟随鼠标
      { baseX: 0.72, baseY: 0.52, r: 0.30, depth: 0.85, ci: 0, sp: 0.075, ph: 1.2, drift: 0.16, par: 0.90 }
    ];

    function currentPalette() {
      var t = document.documentElement.getAttribute("data-theme");
      return PALETTES[t === "dark" ? "dark" : "light"];
    }

    function sizeCanvases() {
      W = window.innerWidth;
      H = window.innerHeight;
      var dpr = Math.min(window.devicePixelRatio || 1, 2); // 上限 2，省内存

      // 主画布：按 DPR 铺满，但我们只往里 drawImage 放大的离屏，所以不会逐像素重画
      canvas.width = Math.max(1, Math.round(W * dpr));
      canvas.height = Math.max(1, Math.round(H * dpr));
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // 之后用 CSS 像素坐标 drawImage

      // 离屏：低分辨率，与 DPR 解耦（柔光不需要 retina）
      OW = Math.max(MIN_OFF, Math.round(W / DOWNSCALE));
      OH = Math.max(MIN_OFF, Math.round(H / DOWNSCALE));
      off.width = OW;
      off.height = OH;
    }

    // 在离屏上画一帧柔光。time 单位秒；用于动画相位。
    function drawSoftLight(time) {
      var pal = currentPalette();

      octx.setTransform(1, 0, 0, 1, 0, 0);
      octx.clearRect(0, 0, OW, OH);

      // 用 lighter 叠加让重叠处自然增亮，像真实焦外光斑
      octx.globalCompositeOperation = "lighter";

      var minDim = Math.min(OW, OH);
      var maxDim = Math.max(OW, OH);
      var aScale = pal.alphaScale;

      for (var i = 0; i < BLOBS.length; i++) {
        var b = BLOBS[i];

        // 呼吸：明暗 + 半径都做缓慢正弦摆动；远斑更慢（已含在 sp）
        var t = time * b.sp;
        var breath = 0.5 + 0.5 * Math.sin(t + b.ph);           // 0..1
        var breath2 = 0.5 + 0.5 * Math.sin(t * 0.7 + b.ph * 1.3);

        // 漂移：李萨如式缓慢游走（归一化）
        var dx = Math.cos(t * 0.9 + b.ph) * b.drift;
        var dy = Math.sin(t * 0.7 + b.ph * 1.5) * b.drift * 0.8;

        // 鼠标视差：近景斑(par 大)偏移更多；远景几乎不动
        var px = (mouse.x - 0.5) * b.par * 0.18;
        var py = (mouse.y - 0.5) * b.par * 0.18;

        var cx = (b.baseX + dx + px) * OW;
        var cy = (b.baseY + dy + py) * OH;

        // 半径：随景深与呼吸变化。远(depth 小)→更大更糊。
        var depthBoost = 1.0 + (1.0 - b.depth) * 0.8;          // 远的更大
        var rad = b.r * minDim * depthBoost * (0.9 + 0.18 * breath2);
        if (rad < 6) rad = 6;

        // 透明度：基础 × 呼吸 × 景深（近的稍亮）× 全局比例
        var depthAlpha = 0.55 + b.depth * 0.45;
        var alpha = aScale * (0.55 + 0.45 * breath) * depthAlpha;

        var col = pal.blobs[b.ci % pal.blobs.length];
        var r = col[0], g = col[1], bl = col[2];

        var grad = octx.createRadialGradient(cx, cy, 0, cx, cy, rad);
        grad.addColorStop(0, "rgba(" + r + "," + g + "," + bl + "," + alpha.toFixed(4) + ")");
        grad.addColorStop(0.45, "rgba(" + r + "," + g + "," + bl + "," + (alpha * 0.45).toFixed(4) + ")");
        grad.addColorStop(1, "rgba(" + r + "," + g + "," + bl + ",0)");

        octx.fillStyle = grad;
        octx.beginPath();
        octx.arc(cx, cy, rad, 0, Math.PI * 2);
        octx.fill();
      }

      octx.globalCompositeOperation = "source-over";

      // ---- 放大铺满主画布 ----
      ctx.clearRect(0, 0, W, H);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      // 极小的额外 blur：放大本身已柔化，这里只补一点点让边缘更奶油。
      // filter 在小图→大图放大时成本低；若浏览器不支持会被忽略。
      ctx.filter = "blur(" + Math.max(0, Math.round(minDim * 0.05)) + "px)";
      ctx.drawImage(off, 0, 0, OW, OH, 0, 0, W, H);
      ctx.filter = "none";
    }

    function frame(now) {
      if (!running) return;
      if (!startTime) startTime = now;
      var time = (now - startTime) / 1000;

      // 鼠标缓动跟随
      mouse.x += (mouse.tx - mouse.x) * 0.05;
      mouse.y += (mouse.ty - mouse.y) * 0.05;

      drawSoftLight(time);
      rafId = requestAnimationFrame(frame);
    }

    function start() {
      if (running) return;
      if (reduceMotion.matches) { renderStatic(); return; }
      if (document.hidden) return;
      running = true;
      startTime = 0;
      rafId = requestAnimationFrame(frame);
    }

    function stop() {
      running = false;
      if (rafId) cancelAnimationFrame(rafId);
      rafId = 0;
    }

    // reduced-motion：画一帧静态柔光（用固定 time 取一个好看的相位）
    function renderStatic() {
      stop();
      drawSoftLight(8.0);
    }

    /* ---------------- 事件 ---------------- */

    // resize 防抖
    var resizeTimer = 0;
    function onResize() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function () {
        sizeCanvases();
        if (reduceMotion.matches || document.hidden) {
          renderStatic();
        }
        // 若在运行，下一帧自然用新尺寸，无需额外处理
      }, 150);
    }
    window.addEventListener("resize", onResize, { passive: true });

    // 鼠标视差（pointer 不阻塞页面，canvas 本身 pointer-events:none）
    window.addEventListener("pointermove", function (e) {
      mouse.tx = e.clientX / (window.innerWidth || 1);
      mouse.ty = e.clientY / (window.innerHeight || 1);
    }, { passive: true });

    // 省电：标签页隐藏停 rAF，恢复时继续
    document.addEventListener("visibilitychange", function () {
      if (document.hidden) {
        stop();
      } else {
        start();
      }
    });

    // reduced-motion 偏好变化时实时响应
    function onRMChange() {
      if (reduceMotion.matches) {
        renderStatic();
      } else {
        start();
      }
    }
    if (reduceMotion.addEventListener) reduceMotion.addEventListener("change", onRMChange);
    else if (reduceMotion.addListener) reduceMotion.addListener(onRMChange); // 老 Safari

    /* ---------------- 主题切换 ---------------- */

    var toggle = document.getElementById("theme-toggle");
    function syncToggleIcon() {
      var t = document.documentElement.getAttribute("data-theme");
      toggle.textContent = (t === "dark") ? "☀️" : "🌙";
    }
    syncToggleIcon();

    toggle.addEventListener("click", function () {
      var cur = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
      var next = cur === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      try { localStorage.setItem("qb_theme", next); } catch (e) {}
      syncToggleIcon();
      // 主题变了 → 颜色随之更新。静态模式重画一帧；动态模式下一帧自动取新色。
      if (reduceMotion.matches || document.hidden) renderStatic();
    });

    /* ---------------- 启动 ---------------- */
    sizeCanvases();
    if (reduceMotion.matches) {
      renderStatic();
    } else {
      start();
    }
  })();
  </script>
</body>
</html>
