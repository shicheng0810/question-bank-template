<!doctype html>
<!--
  ============================================================================
  名称        : B2 — Aurora Flow（流动极光光幕 + 发光浮游粒子）
  美学        : 往「炫、梦幻、高级感」做的方向。整屏是一层缓慢翻涌、不断变形的
                极光色带（蓝 → 青 → 紫 → 粉 的渐变在画面里流动、卷曲、呼吸），
                像顶级 SaaS 落地页那种活的 mesh-gradient 氛围；其上再叠一层
                顺着同一道流场漂移的发光光尘 / 浮游粒子，带辉光与拖尾。深色下
                尤其惊艳。整体仍是背景：题卡区做了「中心压暗」蒙版，流光不会在
                正文上方太亮，文字始终清晰可读。
  实现手法    : 纯原生 Canvas 2D + requestAnimationFrame（无 WebGL / shader /
                外部库 / CDN）。两条关键路线：
                1) 极光光幕 = 在一块「低分辨率离屏 canvas」上算流场并叠加多团
                   additive 的 radial-gradient 光斑：每团光斑的位置由一个程序化
                   流场（多组正弦叠加而成的 curl-ish 向量场）随时间平流推进，
                   颜色沿调色带循环。离屏只有视口的 ~1/14 边长（像素量约 1/200），
                   再用 imageSmoothing + 轻 blur 放大铺满 → 廉价但顺滑的流动 mesh。
                2) 发光粒子 = 第二块「中等分辨率离屏 canvas」（视口 ~1/2 边长），
                   用 additive 的小 radial-gradient 画发光点；不每帧全清，而是
                   每帧铺一层很淡的半透明底色做「衰减」，自然得到流光拖尾。粒子
                   速度直接采样同一个流场函数，所以光尘像被极光「吹」着走。
                合成顺序：body 渐变底 → 光幕(乘 mask 压暗中心带) → 粒子辉光。
  性能要点    :
                - 光幕离屏 DOWNSCALE_FIELD = 14（像素量 ≈ 全屏 1/196）。
                - 粒子离屏 DOWNSCALE_DUST  = 2（够清晰看到辉光，又省一半边长）。
                - 每帧零分配：所有粒子 / 光斑 / 缓冲在初始化时建好，循环里只改数值。
                  radial-gradient 对象每帧重建（半径/透明度在变），但只画在小离屏上。
                - additive 叠加（'lighter'）做发光与色彩融合。
                - DPR 上限 2；离屏与 DPR 解耦（光幕/光尘不需要 retina 精度）。
                - resize 防抖 150ms；粒子数量随屏幕面积自适应并封顶。
                - document.hidden → 停 rAF；visibilitychange → 恢复。
                - prefers-reduced-motion: reduce → 退化为一帧静态多色渐变，不起循环。
  关键参数    :
                - DOWNSCALE_FIELD=14, DOWNSCALE_DUST=2, DPR_CAP=2
                - 光幕光斑数 FIELD_BLOBS=9；流速 FLOW_SPEED；色带循环 COLOR_CYCLE
                - 粒子密度 DUST_PER_MPX（每百万 CSS 像素的粒子数）、上限 DUST_MAX
                - 拖尾衰减 TRAIL_FADE（越小拖尾越长）；视差强度 PARALLAX
                - 中心压暗蒙版 MASK_STRENGTH（保护正文区）
  自包含      : 仅内联 <style> + 内联 <script>，无任何外部库 / CDN / import。
  ============================================================================
-->
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8" />
<title>Aurora Flow — AMT Question Bank</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="color-scheme" content="light dark" />
<script>
  // 早期主题应用，避免首屏闪烁（与站点 qb_theme 约定一致）
  (function () {
    try {
      var k = "qb_theme",
        s = localStorage.getItem(k),
        m = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches,
        t = (s === "dark" || s === "light") ? s : (m ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  })();
</script>
<style>
  :root {
    color-scheme: light;
    --bg: #eef1f6;
    --card: #ffffff;
    --card-2: #f6f8fc;
    --ink: #1e293b;
    --ink-soft: #3b4860;
    --muted: #64748b;
    --border: #e4e8f0;
    --border-strong: #d3d9e4;
    --brand: #2563eb;
    --brand-strong: #1d4ed8;
    --badge-bg: #eef2ff;
    --badge-ink: #3730a3;
    --badge-border: #e0e7ff;
    --hover: #f1f5f9;
    --shadow-sm: 0 1px 2px rgba(16, 24, 40, .06);
    --shadow-md: 0 8px 22px rgba(16, 24, 40, .08);
    --radius: 14px;
    --radius-xs: 8px;
    --pill: 999px;
  }
  html[data-theme="dark"] {
    color-scheme: dark;
    --bg: #0b1020;
    --card: #141b2d;
    --card-2: #0f1626;
    --ink: #e8edf6;
    --ink-soft: #c4cee0;
    --muted: #93a0b8;
    --border: #26304a;
    --border-strong: #33415f;
    --brand: #6f9bff;
    --brand-strong: #5b8cff;
    --badge-bg: rgba(99, 102, 241, .20);
    --badge-ink: #c7d2fe;
    --badge-border: rgba(129, 140, 248, .32);
    --hover: rgba(148, 163, 184, .12);
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, .4);
    --shadow-md: 0 10px 26px rgba(0, 0, 0, .5);
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--ink);
    background: var(--bg);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background .35s ease, color .35s ease;
  }

  /* ---- reduced-motion 时的静态渐变兜底（覆盖在 body 之上、canvas 之下层级） ---- */
  /* 当 JS 检测到 reduce 时会给 <html> 加 .static-bg；纯静态、零动效 */
  html.static-bg body {
    background:
      radial-gradient(1100px 700px at 18% 12%, color-mix(in srgb, var(--brand) 26%, transparent), transparent 60%),
      radial-gradient(900px 800px at 85% 22%, color-mix(in srgb, #38bdc8 24%, transparent), transparent 62%),
      radial-gradient(1000px 900px at 70% 88%, color-mix(in srgb, #8b5cf6 22%, transparent), transparent 60%),
      radial-gradient(800px 700px at 25% 80%, color-mix(in srgb, #ec4899 18%, transparent), transparent 58%),
      var(--bg);
  }

  /* ---- 两层全屏固定背景 canvas ---- */
  .fx {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  /* 光幕在最底，光尘叠在其上（仍都在内容之下） */
  #fx-field { z-index: 0; }
  #fx-dust  { z-index: 0; }
  html.static-bg .fx { display: none; } /* reduced-motion：不显示画布，只留 CSS 渐变 */

  /* ---- 页面内容统一在 canvas 之上 ---- */
  .page {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 18px 16px 80px;
  }

  .app-header {
    position: sticky;
    top: 12px;
    z-index: 2;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    background: color-mix(in srgb, var(--card) 80%, transparent);
    -webkit-backdrop-filter: saturate(150%) blur(12px);
    backdrop-filter: saturate(150%) blur(12px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 18px;
  }
  .header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .logo-dot {
    width: 22px; height: 22px; border-radius: 7px; flex: none;
    background: linear-gradient(135deg, var(--brand), var(--brand-strong));
    box-shadow: 0 2px 8px color-mix(in srgb, var(--brand) 45%, transparent);
  }
  h1 {
    font-size: 1.28rem; font-weight: 750; letter-spacing: -.01em;
    margin: 0; white-space: nowrap;
  }
  .controls { display: flex; align-items: center; gap: 8px; }
  #theme-toggle {
    width: 38px; height: 38px; padding: 0; border-radius: var(--radius-xs);
    font-size: 17px; display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid var(--border-strong); background: var(--card); color: var(--ink);
    cursor: pointer; box-shadow: var(--shadow-sm);
    transition: background .15s, transform .04s;
  }
  #theme-toggle:hover { background: var(--hover); }
  #theme-toggle:active { transform: translateY(1px); }
  #theme-toggle:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }

  .intro {
    margin: 0 0 18px; color: var(--muted); font-size: 13.5px; max-width: 62ch;
  }

  /* 题卡：实心背景（仅极轻透明 + 模糊），保证流光下正文清晰 */
  .question-card {
    background: color-mix(in srgb, var(--card) 94%, transparent);
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 18px 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
    transition: border-color .18s, box-shadow .18s, transform .18s;
  }
  .question-card:hover {
    border-color: var(--border-strong);
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .question-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 6px;
  }
  .q-badge {
    display: inline-flex; align-items: center; font-weight: 700; font-size: 12.5px;
    background: var(--badge-bg); color: var(--badge-ink); border: 1px solid var(--badge-border);
    padding: 3px 10px; border-radius: var(--pill);
  }
  .q-tag { font-size: 12px; color: var(--muted); }
  .question-text {
    font-size: 16.5px; font-weight: 650; line-height: 1.5; margin: 6px 0 10px; color: var(--ink);
  }
  .choices { list-style: none; padding: 0; margin: 10px 0 0; }
  .choice-item { margin: 8px 0; }
  .choice-btn {
    width: 100%; text-align: left; background: var(--card); color: var(--ink);
    border: 1px solid var(--border-strong); border-radius: 10px; padding: 11px 14px;
    display: flex; align-items: flex-start; gap: 11px; font-size: 15px; line-height: 1.45;
    cursor: pointer; transition: background .15s, border-color .15s;
  }
  .choice-btn:hover { background: var(--hover); border-color: var(--brand); }
  .choice-key {
    flex: none; width: 22px; height: 22px; border-radius: 6px; font-size: 12.5px; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--card-2); color: var(--muted); border: 1px solid var(--border);
  }
  footer {
    margin-top: 28px; text-align: center; color: var(--muted); font-size: 12.5px;
  }
</style>
</head>
<body>
  <!-- 两层流动背景：光幕 + 光尘 -->
  <canvas id="fx-field" class="fx" aria-hidden="true"></canvas>
  <canvas id="fx-dust" class="fx" aria-hidden="true"></canvas>

  <!-- 仿真站点内容（垫底真实内容） -->
  <div class="page">
    <header class="app-header">
      <div class="header-left">
        <span class="logo-dot" aria-hidden="true"></span>
        <h1>AMT Question Bank</h1>
      </div>
      <div class="controls">
        <button id="theme-toggle" type="button" aria-label="切换深色 / 浅色主题" title="切换主题">🌙</button>
      </div>
    </header>

    <p class="intro">流动极光（Aurora Flow）背景候选 — 缓慢翻涌的极光色带 + 顺流漂移的发光光尘，深色下尤为梦幻；但题卡区已压暗，正文始终清晰。点右上角按钮切换主题。</p>

    <main id="cards"></main>

    <footer>粒子背景设计候选 · Aurora Flow · 纯原生 Canvas 2D · 离线自包含</footer>
  </div>

  <script>
  (function () {
    "use strict";

    /* ===================== 仿真题卡（垫底真实内容） ===================== */
    (function buildCards() {
      var stems = [
        "Excessive valve clearance in a reciprocating engine will result in which condition?",
        "What is the primary purpose of a fusible plug installed in a tubeless aircraft tire wheel?",
        "Which material is commonly used as the core of a sandwich (honeycomb) structure?",
        "When torquing a bolt, the use of an extension on the torque wrench requires the indicated torque to be ___.",
        "The color of the gas inside a fluorescent strobe-light tube is determined by which factor?",
        "What unit is used to express the electrical resistance of a conductor?",
        "Aircraft magnetos are timed to the engine to fire the spark plugs ___ top dead center.",
        "Which type of corrosion is characterized by a rough, grainy surface and tiny pits?",
        "A pitot-static system blockage at the pitot tube primarily affects which instrument?",
        "What is the function of a check valve in an aircraft hydraulic system?",
        "Aircraft control cables made of corrosion-resistant steel are typically used in which environment?",
        "Which document records the total time in service of an aircraft and its components?"
      ];
      var tags = ["Powerplant", "Airframe", "Materials", "General", "Electrical", "Electrical",
                  "Powerplant", "Materials", "Instruments", "Hydraulics", "Airframe", "Regulations"];
      var opts = [
        ["Lower than normal volumetric efficiency.", "Late valve opening and early closing.", "Increased engine power output."],
        ["Release tire pressure if the wheel overheats.", "Indicate when the tire needs replacement.", "Balance the wheel assembly."],
        ["Aluminum or aramid (Nomex) honeycomb.", "Solid forged titanium.", "Laminated hardwood plies."],
        ["Recalculated using the wrench formula.", "Left unchanged from the chart value.", "Doubled for safety."],
        ["The gas used to fill the tube.", "The voltage applied across it.", "The thickness of the glass."],
        ["The ohm.", "The ampere.", "The watt."],
        ["a few degrees before.", "exactly at.", "well after."],
        ["Intergranular corrosion.", "Surface (pitting) corrosion.", "Stress corrosion cracking."],
        ["The airspeed indicator.", "The vertical speed indicator only.", "The magnetic compass."],
        ["Allow fluid flow in one direction only.", "Regulate system pressure to a set value.", "Filter contaminants from the fluid."],
        ["High-moisture / marine environments.", "Only inside pressurized cabins.", "Dry desert hangars exclusively."],
        ["The aircraft maintenance records / logbook.", "The pilot's personal flight log.", "The fuel receipt ledger."]
      ];
      var keys = ["A", "B", "C"];
      var frag = document.createDocumentFragment();
      for (var i = 0; i < stems.length; i++) {
        var card = document.createElement("article");
        card.className = "question-card";

        var head = document.createElement("div");
        head.className = "question-header";
        var badge = document.createElement("span");
        badge.className = "q-badge";
        badge.textContent = "Question " + (i + 1);
        var tag = document.createElement("span");
        tag.className = "q-tag";
        tag.textContent = tags[i];
        head.appendChild(badge);
        head.appendChild(tag);

        var q = document.createElement("p");
        q.className = "question-text";
        q.textContent = stems[i];

        var ul = document.createElement("ul");
        ul.className = "choices";
        for (var j = 0; j < 3; j++) {
          var li = document.createElement("li");
          li.className = "choice-item";
          var btn = document.createElement("button");
          btn.className = "choice-btn";
          btn.type = "button";
          var k = document.createElement("span");
          k.className = "choice-key";
          k.textContent = keys[j];
          var txt = document.createElement("span");
          txt.textContent = opts[i][j];
          btn.appendChild(k);
          btn.appendChild(txt);
          li.appendChild(btn);
          ul.appendChild(li);
        }

        card.appendChild(head);
        card.appendChild(q);
        card.appendChild(ul);
        frag.appendChild(card);
      }
      document.getElementById("cards").appendChild(frag);
    })();

    /* ===================== Aurora Flow 引擎 ===================== */

    /* ---------------- 调参区（关键参数集中此处） ---------------- */
    var DOWNSCALE_FIELD = 14;   // 光幕离屏 = 视口 / 14（像素量 ≈ 1/196）
    var DOWNSCALE_DUST  = 2;    // 光尘离屏 = 视口 / 2（保留辉光清晰度）
    var DPR_CAP         = 2;    // devicePixelRatio 封顶
    var MIN_OFF         = 24;   // 离屏边长下限，避免极小窗口退化

    var FIELD_BLOBS     = 9;    // 光幕里平流的大光斑数量
    var FLOW_SPEED      = 0.075;// 流场推进速度（光斑被「吹」走的速度）
    var FIELD_FADE      = 0.14; // 光幕每帧底色衰减量（越小越拖、越糊）；这里其实全清重画
    var COLOR_CYCLE     = 0.035;// 光斑沿调色带循环换色的速度

    var DUST_PER_MPX    = 70;   // 每百万 CSS 像素的光尘数量
    var DUST_MAX        = 220;  // 光尘数量上限（性能护栏）
    var DUST_MIN        = 60;   // 光尘数量下限
    var TRAIL_FADE      = 0.085;// 光尘拖尾衰减（越小拖尾越长）
    var DUST_SPEED      = 90;   // 光尘基础速度（CSS px/s 量级，按 dust 离屏缩放）

    var PARALLAX        = 0.05; // 鼠标视差强度（归一化偏移比例）
    var MASK_STRENGTH   = 0.62; // 中心竖带压暗强度（保护正文区，0~1）

    /* ---------------- 主题调色板 ---------------- */
    // 极光色带：蓝 → 青 → 紫 → 粉，光斑颜色沿此带循环采样
    var PALETTES = {
      light: {
        // 浅色：克制一点点透明度，避免盖住正文；色带略偏淡
        band: [
          [37, 99, 235],    // 品牌蓝
          [56, 132, 230],   // 蓝
          [45, 190, 200],   // 青
          [120, 110, 245],  // 靛紫
          [160, 95, 230],   // 紫
          [232, 110, 190]   // 粉
        ],
        fieldAlpha: 0.40,   // 光幕整体强度（往炫里推一点；中心带仍被 mask 压暗保护正文）
        dust: [110, 140, 255],
        dustAlpha: 0.55,
        maskColor: [238, 241, 246] // = --bg，用于压暗中心带（其实是“盖回底色”）
      },
      dark: {
        // 深色：更亮更饱和，做出惊艳的霓虹极光
        band: [
          [111, 155, 255],  // 品牌蓝(dark)
          [80, 170, 255],   // 亮蓝
          [56, 220, 230],   // 青
          [140, 130, 255],  // 靛紫
          [180, 110, 255],  // 紫
          [255, 120, 210]   // 粉
        ],
        fieldAlpha: 0.55,
        dust: [180, 210, 255],
        dustAlpha: 0.85,
        maskColor: [11, 16, 32]    // = --bg(dark)
      }
    };

    function currentTheme() {
      return document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
    }
    function currentPalette() { return PALETTES[currentTheme()]; }

    var reduceMotion = window.matchMedia
      ? window.matchMedia("(prefers-reduced-motion: reduce)")
      : { matches: false, addEventListener: function () {}, addListener: function () {} };

    /* ---------------- canvas / 离屏 ---------------- */
    var cField = document.getElementById("fx-field");
    var xField = cField.getContext("2d", { alpha: true });
    var cDust  = document.getElementById("fx-dust");
    var xDust  = cDust.getContext("2d", { alpha: true });

    // 光幕离屏（低分辨率）
    var oField = document.createElement("canvas");
    var oxField = oField.getContext("2d", { alpha: true });
    // 光尘离屏（中分辨率）
    var oDust = document.createElement("canvas");
    var oxDust = oDust.getContext("2d", { alpha: true });

    var W = 0, H = 0, dpr = 1;
    var FW = 0, FH = 0;   // 光幕离屏尺寸
    var DW = 0, DH = 0;   // 光尘离屏尺寸

    var rafId = 0, running = false;
    var prevNow = 0, elapsed = 0;

    var mouse = { x: 0.5, y: 0.5, tx: 0.5, ty: 0.5 };

    /* ---------------- 程序化流场 ----------------
       返回 (x,y,t) 处的向量 (vx,vy)，归一化坐标系。
       多组正弦/余弦叠加，构造一个随时间缓慢演化、带卷曲感的连续场。
       同一函数被光幕光斑与光尘共用 → 两层「同呼吸」。              */
    function flow(x, y, t, out) {
      var a = Math.sin(x * 3.1 + t * 0.7) + Math.cos(y * 2.7 - t * 0.5);
      var b = Math.sin(y * 3.4 - t * 0.6) + Math.cos(x * 2.3 + t * 0.45);
      var c = Math.sin((x + y) * 2.0 + t * 0.3);
      out.x = Math.cos(a * 1.3 + c) ;
      out.y = Math.sin(b * 1.3 - c) ;
      // 归一长度，避免某些点速度爆掉
      var m = Math.hypot(out.x, out.y) || 1;
      out.x /= m; out.y /= m;
    }
    var _fv = { x: 0, y: 0 }; // 复用向量，零分配

    /* ---------------- 光幕光斑（被流场平流的大色团） ---------------- */
    var blobs = []; // {x,y,r,ci,phase}
    function initBlobs() {
      blobs.length = 0;
      for (var i = 0; i < FIELD_BLOBS; i++) {
        blobs.push({
          x: Math.random(),
          y: Math.random(),
          r: 0.34 + Math.random() * 0.30,   // 归一半径（相对 min 边）
          ci: Math.random() * 6,            // 色带相位（0..6 浮动）
          phase: Math.random() * Math.PI * 2,
          spd: 0.7 + Math.random() * 0.6    // 个体速度差
        });
      }
    }

    // 沿调色带做线性插值取色（band 有 6 个锚点，环形）
    function sampleBand(band, t) {
      var n = band.length;
      t = ((t % n) + n) % n;
      var i0 = Math.floor(t) % n;
      var i1 = (i0 + 1) % n;
      var f = t - Math.floor(t);
      var c0 = band[i0], c1 = band[i1];
      return [
        (c0[0] + (c1[0] - c0[0]) * f),
        (c0[1] + (c1[1] - c0[1]) * f),
        (c0[2] + (c1[2] - c0[2]) * f)
      ];
    }

    /* ---------------- 光尘粒子 ---------------- */
    var dust = []; // {x,y,r,glow,seed}
    function targetDustCount() {
      var mpx = (W * H) / 1e6;
      var n = Math.round(DUST_PER_MPX * mpx);
      return Math.max(DUST_MIN, Math.min(DUST_MAX, n));
    }
    function initDust() {
      var target = targetDustCount();
      dust.length = 0;
      for (var i = 0; i < target; i++) {
        dust.push({
          x: Math.random(),                 // 归一坐标
          y: Math.random(),
          r: 0.6 + Math.random() * 1.9,     // 半径（dust 离屏像素）
          glow: 0.4 + Math.random() * 0.6,  // 个体辉光强度
          seed: Math.random() * 1000,
          vx: 0, vy: 0
        });
      }
    }

    /* ---------------- 尺寸 ---------------- */
    function sizeAll() {
      W = window.innerWidth;
      H = window.innerHeight;
      dpr = Math.min(window.devicePixelRatio || 1, DPR_CAP);

      // 光幕主画布
      cField.width = Math.max(1, Math.round(W * dpr));
      cField.height = Math.max(1, Math.round(H * dpr));
      cField.style.width = W + "px";
      cField.style.height = H + "px";
      xField.setTransform(dpr, 0, 0, dpr, 0, 0);

      // 光尘主画布
      cDust.width = Math.max(1, Math.round(W * dpr));
      cDust.height = Math.max(1, Math.round(H * dpr));
      cDust.style.width = W + "px";
      cDust.style.height = H + "px";
      xDust.setTransform(dpr, 0, 0, dpr, 0, 0);

      // 光幕离屏（低分辨率）
      FW = Math.max(MIN_OFF, Math.round(W / DOWNSCALE_FIELD));
      FH = Math.max(MIN_OFF, Math.round(H / DOWNSCALE_FIELD));
      oField.width = FW; oField.height = FH;

      // 光尘离屏（中分辨率）
      DW = Math.max(MIN_OFF, Math.round(W / DOWNSCALE_DUST));
      DH = Math.max(MIN_OFF, Math.round(H / DOWNSCALE_DUST));
      oDust.width = DW; oDust.height = DH;

      // 清掉光尘离屏（避免 resize 后残留拉伸）
      oxDust.setTransform(1, 0, 0, 1, 0, 0);
      oxDust.clearRect(0, 0, DW, DH);

      // 粒子数随面积调整
      var want = targetDustCount();
      if (Math.abs(want - dust.length) > Math.max(8, want * 0.2)) initDust();
    }

    /* ---------------- 绘制：光幕 ---------------- */
    function drawField(t) {
      var pal = currentPalette();
      var minDim = Math.min(FW, FH);

      oxField.setTransform(1, 0, 0, 1, 0, 0);
      // 光幕每帧全清（离屏极小，重画很便宜；干净不糊）
      oxField.clearRect(0, 0, FW, FH);
      oxField.globalCompositeOperation = "lighter";

      for (var i = 0; i < blobs.length; i++) {
        var b = blobs[i];

        // 用流场推进光斑（平流）。dt 已并入 t 推进，这里直接按当前 t 采样。
        flow(b.x, b.y, t, _fv);
        b.x += _fv.x * FLOW_SPEED * b.spd * fieldDt;
        b.y += _fv.y * FLOW_SPEED * b.spd * fieldDt;

        // 环绕边界（留出半径余量，避免硬切）
        if (b.x < -0.3) b.x += 1.6; else if (b.x > 1.3) b.x -= 1.6;
        if (b.y < -0.3) b.y += 1.6; else if (b.y > 1.3) b.y -= 1.6;

        // 颜色沿色带循环 + 呼吸
        b.ci += COLOR_CYCLE * fieldDt;
        var breath = 0.62 + 0.38 * Math.sin(t * 0.5 + b.phase);

        // 鼠标视差（光斑整体随手轻偏）
        var px = (mouse.x - 0.5) * PARALLAX;
        var py = (mouse.y - 0.5) * PARALLAX;

        var cx = (b.x + px) * FW;
        var cy = (b.y + py) * FH;
        var rad = b.r * minDim * (0.85 + 0.25 * Math.sin(t * 0.4 + b.phase * 1.7));
        if (rad < 4) rad = 4;

        var col = sampleBand(pal.band, b.ci);
        var r = col[0] | 0, g = col[1] | 0, bl = col[2] | 0;
        var alpha = pal.fieldAlpha * breath;

        var grad = oxField.createRadialGradient(cx, cy, 0, cx, cy, rad);
        grad.addColorStop(0, "rgba(" + r + "," + g + "," + bl + "," + alpha.toFixed(4) + ")");
        grad.addColorStop(0.5, "rgba(" + r + "," + g + "," + bl + "," + (alpha * 0.42).toFixed(4) + ")");
        grad.addColorStop(1, "rgba(" + r + "," + g + "," + bl + ",0)");
        oxField.fillStyle = grad;
        oxField.beginPath();
        oxField.arc(cx, cy, rad, 0, Math.PI * 2);
        oxField.fill();
      }
      oxField.globalCompositeOperation = "source-over";

      // ---- 放大铺满光幕主画布 ----
      xField.clearRect(0, 0, W, H);
      xField.imageSmoothingEnabled = true;
      xField.imageSmoothingQuality = "high";
      xField.filter = "blur(" + Math.max(0, Math.round(minDim * 0.04)) + "px)";
      xField.drawImage(oField, 0, 0, FW, FH, 0, 0, W, H);
      xField.filter = "none";

      // ---- 中心竖带压暗：保护正文阅读区 ----
      // 在主画布上用 destination-out（透出）+ 之后正文卡片本身实心，双保险。
      // 这里用一条「盖回底色」的竖向渐变，把中间一条 column 的流光压暗。
      var mc = pal.maskColor;
      var cw = Math.min(720, W * 0.78);           // 受保护列宽（≈ 内容列）
      var x0 = (W - cw) / 2;
      var mg = xField.createLinearGradient(x0, 0, x0 + cw, 0);
      var mAlpha = MASK_STRENGTH;
      mg.addColorStop(0.0,  "rgba(" + mc[0] + "," + mc[1] + "," + mc[2] + ",0)");
      mg.addColorStop(0.18, "rgba(" + mc[0] + "," + mc[1] + "," + mc[2] + "," + (mAlpha * 0.55).toFixed(3) + ")");
      mg.addColorStop(0.5,  "rgba(" + mc[0] + "," + mc[1] + "," + mc[2] + "," + mAlpha.toFixed(3) + ")");
      mg.addColorStop(0.82, "rgba(" + mc[0] + "," + mc[1] + "," + mc[2] + "," + (mAlpha * 0.55).toFixed(3) + ")");
      mg.addColorStop(1.0,  "rgba(" + mc[0] + "," + mc[1] + "," + mc[2] + ",0)");
      xField.fillStyle = mg;
      xField.fillRect(0, 0, W, H);
    }

    /* ---------------- 绘制：光尘 ---------------- */
    function drawDust(t) {
      var pal = currentPalette();

      oxDust.setTransform(1, 0, 0, 1, 0, 0);

      // 拖尾：铺一层很淡的底色做衰减，而不是全清
      // 用 maskColor（=背景色）做衰减底，确保旧帧逐渐褪回背景而非纯黑/纯白
      var mc = pal.maskColor;
      oxDust.globalCompositeOperation = "source-over";
      oxDust.fillStyle = "rgba(" + mc[0] + "," + mc[1] + "," + mc[2] + "," + TRAIL_FADE + ")";
      oxDust.fillRect(0, 0, DW, DH);

      oxDust.globalCompositeOperation = "lighter";
      var dr = pal.dust, dr0 = dr[0], dr1 = dr[1], dr2 = dr[2];
      var dustAlpha = pal.dustAlpha;
      var speedPx = DUST_SPEED / DOWNSCALE_DUST; // 换算到 dust 离屏像素/s

      for (var i = 0; i < dust.length; i++) {
        var p = dust[i];

        // 速度采样同一流场（让光尘像被极光吹动）
        flow(p.x, p.y, t * 1.05, _fv);
        p.vx = _fv.x;
        p.vy = _fv.y;
        p.x += (p.vx * speedPx * dustDt) / DW;
        p.y += (p.vy * speedPx * dustDt) / DH;

        // 鼠标视差（轻微）
        var mvx = (mouse.x - 0.5) * PARALLAX * 0.4;
        var mvy = (mouse.y - 0.5) * PARALLAX * 0.4;

        // 环绕
        if (p.x < -0.02) p.x += 1.04; else if (p.x > 1.02) p.x -= 1.04;
        if (p.y < -0.02) p.y += 1.04; else if (p.y > 1.02) p.y -= 1.04;

        var cx = (p.x + mvx) * DW;
        var cy = (p.y + mvy) * DH;

        // 闪烁（每颗不同相位）
        var tw = 0.55 + 0.45 * Math.sin(t * 1.6 + p.seed);
        var a = dustAlpha * p.glow * tw;
        var rad = p.r * (1.6 + 0.8 * tw);

        // 发光点：核心亮 + 辉光衰减
        var g = oxDust.createRadialGradient(cx, cy, 0, cx, cy, rad * 3);
        g.addColorStop(0,   "rgba(" + dr0 + "," + dr1 + "," + dr2 + "," + a.toFixed(4) + ")");
        g.addColorStop(0.4, "rgba(" + dr0 + "," + dr1 + "," + dr2 + "," + (a * 0.35).toFixed(4) + ")");
        g.addColorStop(1,   "rgba(" + dr0 + "," + dr1 + "," + dr2 + ",0)");
        oxDust.fillStyle = g;
        oxDust.beginPath();
        oxDust.arc(cx, cy, rad * 3, 0, Math.PI * 2);
        oxDust.fill();
      }
      oxDust.globalCompositeOperation = "source-over";

      // ---- 放大铺满光尘主画布 ----
      xDust.clearRect(0, 0, W, H);
      xDust.imageSmoothingEnabled = true;
      xDust.imageSmoothingQuality = "high";
      xDust.drawImage(oDust, 0, 0, DW, DH, 0, 0, W, H);
    }

    /* ---------------- 帧循环 ---------------- */
    var fieldDt = 0.016, dustDt = 0.016; // 上一帧 dt（秒），供平流使用
    function frame(now) {
      if (!running) return;
      if (!prevNow) prevNow = now;
      var dt = (now - prevNow) / 1000;
      prevNow = now;
      if (dt > 0.05) dt = 0.05;   // 卡顿/切回时夹住，避免大跳
      fieldDt = dt; dustDt = dt;
      elapsed += dt;

      // 鼠标缓动
      mouse.x += (mouse.tx - mouse.x) * 0.06;
      mouse.y += (mouse.ty - mouse.y) * 0.06;

      drawField(elapsed);
      drawDust(elapsed);

      rafId = requestAnimationFrame(frame);
    }

    function start() {
      if (running) return;
      if (reduceMotion.matches) { renderStatic(); return; }
      if (document.hidden) return;
      running = true;
      prevNow = 0;
      rafId = requestAnimationFrame(frame);
    }
    function stop() {
      running = false;
      if (rafId) cancelAnimationFrame(rafId);
      rafId = 0;
    }

    /* ---------------- reduced-motion 静态兜底 ----------------
       退化为纯 CSS 多色渐变（见 <style> .static-bg），画布隐藏、不起循环。 */
    function renderStatic() {
      stop();
      document.documentElement.classList.add("static-bg");
      // 清空两层画布，避免残留
      xField.clearRect(0, 0, W, H);
      xDust.clearRect(0, 0, W, H);
    }
    function leaveStatic() {
      document.documentElement.classList.remove("static-bg");
    }

    /* ---------------- 事件 ---------------- */
    var resizeTimer = 0;
    window.addEventListener("resize", function () {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function () {
        sizeAll();
        if (reduceMotion.matches) renderStatic();
      }, 150);
    }, { passive: true });

    window.addEventListener("pointermove", function (e) {
      mouse.tx = e.clientX / (window.innerWidth || 1);
      mouse.ty = e.clientY / (window.innerHeight || 1);
    }, { passive: true });

    document.addEventListener("visibilitychange", function () {
      if (document.hidden) stop();
      else if (!reduceMotion.matches) start();
    });

    function onRMChange() {
      if (reduceMotion.matches) renderStatic();
      else { leaveStatic(); start(); }
    }
    if (reduceMotion.addEventListener) reduceMotion.addEventListener("change", onRMChange);
    else if (reduceMotion.addListener) reduceMotion.addListener(onRMChange);

    /* ---------------- 主题切换 ---------------- */
    var toggle = document.getElementById("theme-toggle");
    function syncToggleIcon() {
      toggle.textContent = currentTheme() === "dark" ? "☀️" : "🌙";
    }
    syncToggleIcon();
    toggle.addEventListener("click", function () {
      var next = currentTheme() === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      try { localStorage.setItem("qb_theme", next); } catch (e) {}
      syncToggleIcon();
      // 主题变色：动态模式下一帧自动取新色；静态模式无需重画（CSS 变量已切）。
      // 切主题瞬间清一下光尘离屏，避免旧色拖尾残留一两秒。
      oxDust.setTransform(1, 0, 0, 1, 0, 0);
      oxDust.clearRect(0, 0, DW, DH);
    });

    /* ---------------- 启动 ---------------- */
    initBlobs();
    initDust();
    sizeAll();
    if (reduceMotion.matches) {
      renderStatic();
    } else {
      start();
    }
  })();
  </script>
</body>
</html>
